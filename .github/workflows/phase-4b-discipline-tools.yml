name: Phase 4B Discipline Tools APK

on:
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  patch-build:
    name: Patch Phase 4B and Build APK
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=1024m -Dfile.encoding=UTF-8"
      JAVA_TOOL_OPTIONS: "-Xmx4096m"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Apply Phase 4B working-code patch
        run: |
          python3 - <<'PY'
          from pathlib import Path

          root = Path("focus_shield_android")

          def write(path, text):
              full = root / path
              full.parent.mkdir(parents=True, exist_ok=True)
              full.write_text(text.strip() + "\n")

          write("lib/domain/models/focus_shield_state.dart", r'''
          import '../../core/utils/date_key.dart';

          class FocusShieldState {
            FocusShieldState({
              required this.listeningWinsToday,
              required this.missionTarget,
              required this.xp,
              required this.blockedAttempts,
              required this.recoveredAttempts,
              required this.focusSessionsToday,
              required this.reflectionsToday,
              required this.concentrationWinsToday,
              required this.protectionEnabled,
              required this.morningCommandSet,
              required this.endReviewsToday,
              required this.lastActiveDate,
              required this.currentStreak,
              required this.longestStreak,
              required this.completedDays,
              required this.commitmentDays,
              required this.commitmentStartDate,
              required this.totalWebsitesScanned,
              required this.websitesScannedToday,
              required this.newWebsitesScannedToday,
              required this.scannedDomainsToday,
              required this.lastReflectionText,
            });

            factory FocusShieldState.initial() {
              return FocusShieldState(
                listeningWinsToday: 0,
                missionTarget: 3,
                xp: 0,
                blockedAttempts: 0,
                recoveredAttempts: 0,
                focusSessionsToday: 0,
                reflectionsToday: 0,
                concentrationWinsToday: 0,
                protectionEnabled: false,
                morningCommandSet: false,
                endReviewsToday: 0,
                lastActiveDate: DateKey.today(),
                currentStreak: 0,
                longestStreak: 0,
                completedDays: 0,
                commitmentDays: 0,
                commitmentStartDate: '',
                totalWebsitesScanned: 0,
                websitesScannedToday: 0,
                newWebsitesScannedToday: 0,
                scannedDomainsToday: '',
                lastReflectionText: '',
              );
            }

            factory FocusShieldState.fromMap(Map<String, dynamic> map) {
              final state = FocusShieldState(
                listeningWinsToday: (map['listeningWinsToday'] as int?) ?? 0,
                missionTarget: (map['missionTarget'] as int?) ?? 3,
                xp: (map['xp'] as int?) ?? 0,
                blockedAttempts: (map['blockedAttempts'] as int?) ?? 0,
                recoveredAttempts: (map['recoveredAttempts'] as int?) ?? 0,
                focusSessionsToday: (map['focusSessionsToday'] as int?) ?? 0,
                reflectionsToday: (map['reflectionsToday'] as int?) ?? 0,
                concentrationWinsToday:
                    (map['concentrationWinsToday'] as int?) ?? 0,
                protectionEnabled: (map['protectionEnabled'] as bool?) ?? false,
                morningCommandSet: (map['morningCommandSet'] as bool?) ?? false,
                endReviewsToday: (map['endReviewsToday'] as int?) ?? 0,
                lastActiveDate:
                    (map['lastActiveDate'] as String?) ?? DateKey.today(),
                currentStreak: (map['currentStreak'] as int?) ?? 0,
                longestStreak: (map['longestStreak'] as int?) ?? 0,
                completedDays: (map['completedDays'] as int?) ?? 0,
                commitmentDays: (map['commitmentDays'] as int?) ?? 0,
                commitmentStartDate:
                    (map['commitmentStartDate'] as String?) ?? '',
                totalWebsitesScanned:
                    (map['totalWebsitesScanned'] as int?) ?? 0,
                websitesScannedToday:
                    (map['websitesScannedToday'] as int?) ?? 0,
                newWebsitesScannedToday:
                    (map['newWebsitesScannedToday'] as int?) ?? 0,
                scannedDomainsToday:
                    (map['scannedDomainsToday'] as String?) ?? '',
                lastReflectionText:
                    (map['lastReflectionText'] as String?) ?? '',
              );
              state.normalizeLegacyStarterXp();
              return state;
            }

            int listeningWinsToday;
            int missionTarget;
            int xp;
            int blockedAttempts;
            int recoveredAttempts;
            int focusSessionsToday;
            int reflectionsToday;
            int concentrationWinsToday;
            bool protectionEnabled;
            bool morningCommandSet;
            int endReviewsToday;
            String lastActiveDate;
            int currentStreak;
            int longestStreak;
            int completedDays;

            int commitmentDays;
            String commitmentStartDate;

            int totalWebsitesScanned;
            int websitesScannedToday;
            int newWebsitesScannedToday;
            String scannedDomainsToday;

            String lastReflectionText;

            int get xpForNextLevel => 100;
            int get level => (xp ~/ xpForNextLevel) + 1;
            int get xpInCurrentLevel => xp % xpForNextLevel;

            double get levelProgress {
              if (xpForNextLevel == 0) return 0;
              return xpInCurrentLevel / xpForNextLevel;
            }

            bool get focusSessionCompletedToday => focusSessionsToday > 0;
            bool get reflectionCompletedToday => reflectionsToday > 0;
            bool get concentrationCompletedToday => concentrationWinsToday > 0;

            bool get dailyCoreTasksComplete {
              return focusSessionCompletedToday &&
                  reflectionCompletedToday &&
                  concentrationCompletedToday;
            }

            bool get commitmentSet {
              return commitmentDays > 0 && commitmentStartDate.trim().isNotEmpty;
            }

            DateTime? get commitmentStart {
              if (!commitmentSet) return null;
              return DateTime.tryParse(commitmentStartDate);
            }

            DateTime? get commitmentEnd {
              final start = commitmentStart;
              if (start == null) return null;
              return start.add(Duration(days: commitmentDays));
            }

            int get commitmentDaysRemaining {
              final end = commitmentEnd;
              if (end == null) return 0;
              final difference = end.difference(DateTime.now()).inDays + 1;
              return difference < 0 ? 0 : difference;
            }

            bool get commitmentActive {
              return commitmentSet && commitmentDaysRemaining > 0;
            }

            bool get protectionReady {
              return commitmentSet;
            }

            bool get hasTrackedActivity {
              return listeningWinsToday > 0 ||
                  blockedAttempts > 0 ||
                  recoveredAttempts > 0 ||
                  focusSessionsToday > 0 ||
                  reflectionsToday > 0 ||
                  concentrationWinsToday > 0 ||
                  morningCommandSet ||
                  endReviewsToday > 0 ||
                  currentStreak > 0 ||
                  longestStreak > 0 ||
                  completedDays > 0 ||
                  totalWebsitesScanned > 0;
            }

            void normalizeLegacyStarterXp() {
              if (xp == 45 && !hasTrackedActivity) {
                xp = 0;
              }
              if (xp < 0) {
                xp = 0;
              }
            }

            void setCommitment(int days) {
              if (commitmentActive) {
                return;
              }
              commitmentDays = days;
              commitmentStartDate = DateTime.now().toIso8601String();
              protectionEnabled = true;
            }

            void recordWebsiteScan(String rawDomain) {
              final domain = rawDomain.trim().toLowerCase();
              if (domain.isEmpty) return;

              totalWebsitesScanned += 1;
              websitesScannedToday += 1;

              final seen = scannedDomainsToday
                  .split('|')
                  .where((item) => item.trim().isNotEmpty)
                  .toSet();

              if (!seen.contains(domain)) {
                newWebsitesScannedToday += 1;
                seen.add(domain);
              }

              scannedDomainsToday = seen.join('|');
            }

            int get recoveryRate {
              if (blockedAttempts == 0) return 100;
              return ((recoveredAttempts / blockedAttempts) * 100).round();
            }

            int get pendingRecoveries {
              final pending = blockedAttempts - recoveredAttempts;
              return pending < 0 ? 0 : pending;
            }

            int get missionScore {
              if (missionTarget == 0) return 100;
              return ((listeningWinsToday / missionTarget) * 100)
                  .clamp(0, 100)
                  .round();
            }

            int get coachScore {
              final morningScore = morningCommandSet ? 25 : 0;
              final missionPart = (missionScore * 0.35).round();
              final recoveryPart = (recoveryRate * 0.25).round();
              final activityPart =
                  ((focusSessionsToday + reflectionsToday + concentrationWinsToday) *
                          10)
                      .clamp(0, 15)
                      .toInt();

              return (morningScore + missionPart + recoveryPart + activityPart)
                  .clamp(0, 100);
            }

            bool get missionComplete => listeningWinsToday >= missionTarget;

            void recordCompletedDay({required bool missionWasComplete}) {
              completedDays += 1;
              if (missionWasComplete) {
                currentStreak += 1;
                if (currentStreak > longestStreak) {
                  longestStreak = currentStreak;
                }
                return;
              }
              currentStreak = 0;
            }

            bool applyDailyResetIfNeeded({DateTime? now}) {
              final todayKey = DateKey.today(now);
              if (lastActiveDate == todayKey) {
                return false;
              }

              listeningWinsToday = 0;
              focusSessionsToday = 0;
              reflectionsToday = 0;
              concentrationWinsToday = 0;
              websitesScannedToday = 0;
              newWebsitesScannedToday = 0;
              scannedDomainsToday = '';
              morningCommandSet = false;
              endReviewsToday = 0;
              lastActiveDate = todayKey;
              return true;
            }

            FocusShieldState copy() {
              return FocusShieldState(
                listeningWinsToday: listeningWinsToday,
                missionTarget: missionTarget,
                xp: xp,
                blockedAttempts: blockedAttempts,
                recoveredAttempts: recoveredAttempts,
                focusSessionsToday: focusSessionsToday,
                reflectionsToday: reflectionsToday,
                concentrationWinsToday: concentrationWinsToday,
                protectionEnabled: protectionEnabled,
                morningCommandSet: morningCommandSet,
                endReviewsToday: endReviewsToday,
                lastActiveDate: lastActiveDate,
                currentStreak: currentStreak,
                longestStreak: longestStreak,
                completedDays: completedDays,
                commitmentDays: commitmentDays,
                commitmentStartDate: commitmentStartDate,
                totalWebsitesScanned: totalWebsitesScanned,
                websitesScannedToday: websitesScannedToday,
                newWebsitesScannedToday: newWebsitesScannedToday,
                scannedDomainsToday: scannedDomainsToday,
                lastReflectionText: lastReflectionText,
              );
            }

            Map<String, dynamic> toMap() {
              return {
                'listeningWinsToday': listeningWinsToday,
                'missionTarget': missionTarget,
                'xp': xp,
                'blockedAttempts': blockedAttempts,
                'recoveredAttempts': recoveredAttempts,
                'focusSessionsToday': focusSessionsToday,
                'reflectionsToday': reflectionsToday,
                'concentrationWinsToday': concentrationWinsToday,
                'protectionEnabled': protectionEnabled,
                'morningCommandSet': morningCommandSet,
                'endReviewsToday': endReviewsToday,
                'lastActiveDate': lastActiveDate,
                'currentStreak': currentStreak,
                'longestStreak': longestStreak,
                'completedDays': completedDays,
                'commitmentDays': commitmentDays,
                'commitmentStartDate': commitmentStartDate,
                'commitmentDaysRemaining': commitmentDaysRemaining,
                'commitmentActive': commitmentActive,
                'commitmentSet': commitmentSet,
                'totalWebsitesScanned': totalWebsitesScanned,
                'websitesScannedToday': websitesScannedToday,
                'newWebsitesScannedToday': newWebsitesScannedToday,
                'scannedDomainsToday': scannedDomainsToday,
                'lastReflectionText': lastReflectionText,
                'level': level,
                'xpInCurrentLevel': xpInCurrentLevel,
                'xpForNextLevel': xpForNextLevel,
                'levelProgress': levelProgress,
                'recoveryRate': recoveryRate,
                'coachScore': coachScore,
                'missionComplete': missionComplete,
                'dailyCoreTasksComplete': dailyCoreTasksComplete,
              };
            }
          }
          ''')

          write("lib/data/contracts/database_contract.dart", r'''
          class DatabaseContract {
            static const databaseName = 'focus_shield.db';
            static const databaseVersion = 4;

            static const tableAppState = 'app_state';
            static const tableBlockedAttempts = 'blocked_attempts';
            static const tableSettings = 'settings';
            static const tableGoals = 'goals';
            static const tableAffirmations = 'affirmations';
            static const tableBlockedDomains = 'blocked_domains';
            static const tableDailySummaries = 'daily_summaries';

            static const columnId = 'id';
            static const columnCreatedAt = 'created_at';
            static const columnUpdatedAt = 'updated_at';
          }
          ''')

          write("lib/data/mappers/focus_shield_state_mapper.dart", r'''
          import '../../core/utils/date_key.dart';
          import '../../domain/models/focus_shield_state.dart';

          class FocusShieldStateMapper {
            static Map<String, Object?> toDatabaseMap(FocusShieldState state) {
              return {
                'id': 1,
                'listening_wins_today': state.listeningWinsToday,
                'mission_target': state.missionTarget,
                'xp': state.xp,
                'blocked_attempts': state.blockedAttempts,
                'recovered_attempts': state.recoveredAttempts,
                'focus_sessions_today': state.focusSessionsToday,
                'reflections_today': state.reflectionsToday,
                'concentration_wins_today': state.concentrationWinsToday,
                'protection_enabled': state.protectionEnabled ? 1 : 0,
                'morning_command_set': state.morningCommandSet ? 1 : 0,
                'end_reviews_today': state.endReviewsToday,
                'last_active_date': state.lastActiveDate,
                'current_streak': state.currentStreak,
                'longest_streak': state.longestStreak,
                'completed_days': state.completedDays,
                'commitment_days': state.commitmentDays,
                'commitment_start_date': state.commitmentStartDate,
                'total_websites_scanned': state.totalWebsitesScanned,
                'websites_scanned_today': state.websitesScannedToday,
                'new_websites_scanned_today': state.newWebsitesScannedToday,
                'scanned_domains_today': state.scannedDomainsToday,
                'last_reflection_text': state.lastReflectionText,
                'updated_at': DateTime.now().toIso8601String(),
              };
            }

            static FocusShieldState fromDatabaseMap(Map<String, Object?> map) {
              return FocusShieldState(
                listeningWinsToday: (map['listening_wins_today'] as int?) ?? 0,
                missionTarget: (map['mission_target'] as int?) ?? 3,
                xp: (map['xp'] as int?) ?? 0,
                blockedAttempts: (map['blocked_attempts'] as int?) ?? 0,
                recoveredAttempts: (map['recovered_attempts'] as int?) ?? 0,
                focusSessionsToday: (map['focus_sessions_today'] as int?) ?? 0,
                reflectionsToday: (map['reflections_today'] as int?) ?? 0,
                concentrationWinsToday:
                    (map['concentration_wins_today'] as int?) ?? 0,
                protectionEnabled: ((map['protection_enabled'] as int?) ?? 0) == 1,
                morningCommandSet:
                    ((map['morning_command_set'] as int?) ?? 0) == 1,
                endReviewsToday: (map['end_reviews_today'] as int?) ?? 0,
                lastActiveDate:
                    (map['last_active_date'] as String?) ?? DateKey.today(),
                currentStreak: (map['current_streak'] as int?) ?? 0,
                longestStreak: (map['longest_streak'] as int?) ?? 0,
                completedDays: (map['completed_days'] as int?) ?? 0,
                commitmentDays: (map['commitment_days'] as int?) ?? 0,
                commitmentStartDate:
                    (map['commitment_start_date'] as String?) ?? '',
                totalWebsitesScanned:
                    (map['total_websites_scanned'] as int?) ?? 0,
                websitesScannedToday:
                    (map['websites_scanned_today'] as int?) ?? 0,
                newWebsitesScannedToday:
                    (map['new_websites_scanned_today'] as int?) ?? 0,
                scannedDomainsToday:
                    (map['scanned_domains_today'] as String?) ?? '',
                lastReflectionText:
                    (map['last_reflection_text'] as String?) ?? '',
              );
            }
          }
          ''')
