          import 'dart:async';

          import 'package:flutter/material.dart';

          import '../../core/theme/app_theme.dart';
          import '../services/phase6q_completion_alerts.dart';
          import '../widgets/action_button.dart';
          import '../widgets/shield_card.dart';

          class FocusTimerScreen extends StatefulWidget {
            const FocusTimerScreen({
              super.key,
              required this.onBack,
              required this.onCompleted,
            });

            final VoidCallback onBack;
            final ValueChanged<int> onCompleted;

            @override
            State<FocusTimerScreen> createState() => _FocusTimerScreenState();
          }

          class _FocusTimerScreenState extends State<FocusTimerScreen> {
            final _minutesController = TextEditingController(text: '10');

            Timer? _timer;
            int _remainingSeconds = 0;
            int _selectedMinutes = 10;
            bool _running = false;
            bool _completed = false;
            bool _finishing = false;

            @override
            void dispose() {
              _timer?.cancel();
              _minutesController.dispose();
              super.dispose();
            }

            String get _countdownText {
              final minutes = (_remainingSeconds ~/ 60).toString().padLeft(2, '0');
              final seconds = (_remainingSeconds % 60).toString().padLeft(2, '0');
              return '$minutes:$seconds';
            }

            void _start() {
              final parsed = int.tryParse(_minutesController.text.trim()) ?? 10;
              final minutes = parsed < 1 ? 1 : parsed > 180 ? 180 : parsed;

              _timer?.cancel();

              setState(() {
                _selectedMinutes = minutes;
                _remainingSeconds = minutes * 60;
                _running = true;
                _completed = false;
                _finishing = false;
              });

              _timer = Timer.periodic(const Duration(seconds: 1), (timer) {
                if (_remainingSeconds <= 1) {
                  timer.cancel();
                  _finish();
                  return;
                }

                setState(() {
                  _remainingSeconds -= 1;
                });
              });
            }

            void _pause() {
              _timer?.cancel();

              setState(() {
                _running = false;
              });
            }

            void _reset() {
              _timer?.cancel();

              setState(() {
                _running = false;
                _remainingSeconds = 0;
                _completed = false;
                _finishing = false;
              });
            }

            Future<void> _finish() async {
              if (_completed || _finishing) return;

              _timer?.cancel();

              setState(() {
                _running = false;
                _remainingSeconds = 0;
                _completed = true;
                _finishing = true;
