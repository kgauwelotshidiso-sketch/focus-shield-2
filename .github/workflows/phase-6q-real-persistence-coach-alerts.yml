                _showConcentration = false;
                _showReflection = false;
                _selectedIndex = 3;
              });
            }

            String _normalizeDomain(String input) {
              var value = input.trim().toLowerCase();
              value = value.replaceFirst(RegExp(r'^https?://'), '');
              value = value.replaceFirst(RegExp(r'^www\.'), '');
              value = value.split('/').first;
              value = value.split('?').first;
              value = value.split('#').first;
              return value;
            }

            void _addBlockedDomain(String domain, String category) {
              final normalizedDomain = _normalizeDomain(domain);

              if (normalizedDomain.isEmpty) return;

              _repository
                  .saveBlockedDomain(
                    BlockedDomain(
                      id: 0,
                      domain: normalizedDomain,
                      category: category.trim().isEmpty
                          ? 'custom-blocklist'
                          : category.trim(),
                      updatedAt: DateTime.now(),
                    ),
                  )
                  .then((_) => _refreshBlockedDomains());
            }

            void _deleteBlockedDomain(int id) {
              _repository.deleteBlockedDomain(id).then(
                    (_) => _refreshBlockedDomains(),
                  );
            }

            void _addGoal(String title, String description) {
              final cleanTitle = title.trim();

              if (cleanTitle.isEmpty) return;

              _repository
                  .saveGoal(
                    Goal(
                      id: 0,
                      title: cleanTitle,
                      description: description.trim(),
                    ),
                  )
                  .then((_) => _refreshGoalsAffirmations());
            }

            void _deleteGoal(int id) {
              _repository.deleteGoal(id).then((_) => _refreshGoalsAffirmations());
            }

            void _addAffirmation(String text, bool favorite) {
              final cleanText = text.trim();

              if (cleanText.isEmpty) return;

              _repository
                  .saveAffirmation(
                    Affirmation(
                      id: 0,
                      text: cleanText,
                      favorite: favorite,
                    ),
                  )
                  .then((_) => _refreshGoalsAffirmations());
            }

            void _deleteAffirmation(int id) {
              _repository.deleteAffirmation(id).then(
                    (_) => _refreshGoalsAffirmations(),
                  );
            }

            void _setFavoriteAffirmation(Affirmation affirmation) {
              _repository
                  .saveAffirmation(
                    affirmation.copyWith(
                      favorite: true,
                      updatedAt: DateTime.now(),
                    ),
                  )
                  .then((_) => _refreshGoalsAffirmations());
            }
            Future<void> _resetAppData() async {
              await _repository.clearAll();
              await Phase6QCommitmentStore.clear();

              final snapshot = await _repository.loadSnapshot();
              final settings = await _repository.loadSettings();
              final attempts = await _repository.loadAttempts();
              final blockedDomains = await _repository.loadBlockedDomains();
              final dailySummaries = await _repository.loadDailySummaries();
              final goals = await _repository.loadGoals();
              final affirmations = await _repository.loadAffirmations();

              if (!mounted) return;

              setState(() {
                _state = snapshot.state;
                _state.protectionEnabled =
                    settings.protectionEnabled && _state.commitmentActive;
                _attempts = attempts;
                _blockedDomains = blockedDomains;
                _dailySummaries = dailySummaries;
                _goals = goals;
                _affirmations = affirmations;
                _selectedIndex = 0;
                _startupGateComplete = false;
                _hideOverlays();
                _lastBlockedDecision = null;
              });
            }

            void _openIntervention(ProtectionDecision decision) {
              setState(() {
                _lastBlockedDecision = decision;
                _state.blockedAttempts += 1;
                _selectedIndex = 1;
                _hideOverlays();
                _showIntervention = true;
              });

              _repository
                  .saveAttempt(
                    AttemptRecord(
                      id: 0,
                      domain: decision.domain,
                      category: decision.category,
                      confidence: decision.confidence,
                      recovered: false,
                      createdAt: DateTime.now(),
                    ),
                  )
                  .then((_) => _refreshAttempts());

              _persistState();
            }

            void _returnToScanner() {
              setState(() {
                _selectedIndex = 1;
                _hideOverlays();
              });
            }

            void _handleScannerDecision(ProtectionDecision decision) {
              setState(() {
                _state.recordWebsiteScan(decision.domain);
              });

              _persistState();

              if (decision.blocked && _state.protectionEnabled) {
                _openIntervention(decision);
              }
            }

            void _logListeningWin() {
              setState(() {
                _state.listeningWinsToday += 1;
                _state.xp += 10;
              });

              _persistState();
            }

            void _completeFocusSession(int minutes) {
              setState(() {
                _state.focusSessionsToday += 1;
                _state.xp += 20;
                _showFocusTimer = false;
                _selectedIndex = 3;
              });

              _persistState();
            }

            void _completeReflection(String reflectionText) {
              setState(() {
                _state.reflectionsToday += 1;
                _state.lastReflectionText = reflectionText;
                _state.xp += 15;
                _showReflection = false;
                _selectedIndex = 3;
              });

              _persistState();
            }

            void _completeConcentration(String thought) {
              setState(() {
                _state.concentrationWinsToday += 1;
                _state.xp += 15;
                _showConcentration = false;
                _selectedIndex = 3;
              });

              _persistState();
            }

            void _markRecovered() {
              setState(() {
                if (_state.pendingRecoveries > 0) {
                  _state.recoveredAttempts += 1;
                  _state.xp += 10;
                }

                _hideOverlays();
                _selectedIndex = 2;
              });

              _repository.markLatestAttemptRecovered().then(
                    (_) => _refreshAttempts(),
                  );

              _persistState();
            }

            void _markAttemptRecoveredById(int id) {
              AttemptRecord? attempt;

              for (final item in _attempts) {
                if (item.id == id) {
                  attempt = item;
                  break;
                }
              }

              final shouldReward = attempt != null && !attempt.recovered;

              setState(() {
                if (shouldReward) {
                  _state.xp += 10;
                }
              });

              _repository.markAttemptRecovered(id).then(
                    (_) => _refreshAttempts(),
                  );
            }

            void _setMorningCommand() {
              setState(() {
                if (!_state.morningCommandSet) {
                  _state.xp += 10;
                }

                _state.morningCommandSet = true;
              });

              _persistState();
            }

            void _saveEndReview() {
              setState(() {
                _state.endReviewsToday += 1;
                _state.reflectionsToday += 1;
                _state.xp += 15;
              });

              _persistState();
            }

            void _toggleProtection() {
              if (!_state.commitmentSet) {
                setState(() {
                  _startupGateComplete = false;
                  _selectedIndex = 0;
                  _hideOverlays();
                });
                return;
              }

              if (_state.commitmentActive && _state.protectionEnabled) {
                return;
              }

              setState(() {
                _state.protectionEnabled = !_state.protectionEnabled;
              });

              _persistState();
              _persistSettings();
            }

            void _setCommitmentDays(int days) {
              setState(() {
                _state.setCommitment(days);
                _state.protectionEnabled = true;
              });

              Phase6QCommitmentStore.saveFromState(_state);
              _persistState();
              _persistSettings();
            }

            Future<void> _openAccessibilitySettings() async {
              await ProtectionChannel().openAccessibilitySettings();
            }

            Future<void> _openVpnSetup() async {
              await ProtectionChannel().openVpnSettings();
            }

            void _completeStartupSetup() {
              setState(() {
                _startupGateComplete = true;
                _selectedIndex = 0;
                _hideOverlays();
              });
            }
            @override
            Widget build(BuildContext context) {
              if (_loading) {
                return const Scaffold(
                  body: SafeArea(
                    child: Center(
                      child: Text('Loading Focus Shield...'),
                    ),
                  ),
                );
              }

              if (!_state.commitmentSet || !_startupGateComplete) {
                return StartupCommitmentGateScreen(
                  state: _state,
                  onSetCommitmentDays: _setCommitmentDays,
                  onOpenAccessibilitySettings: () {
                    _openAccessibilitySettings();
                  },
                  onOpenVpnSetup: () {
                    _openVpnSetup();
                  },
                  onContinueToApp: _completeStartupSetup,
                );
              }

              Widget? overlay;

              if (_showProductionReadiness) {
                overlay = ProductionReadinessScreen(
                  onBack: _closeProductionReadiness,
                );
              } else if (_showGoalsAffirmations) {
                overlay = GoalsAffirmationsScreen(
                  goals: _goals,
                  affirmations: _affirmations,
                  onBack: _closeGoalsAffirmations,
                  onAddGoal: _addGoal,
                  onDeleteGoal: _deleteGoal,
                  onAddAffirmation: _addAffirmation,
                  onDeleteAffirmation: _deleteAffirmation,
                  onSetFavoriteAffirmation: _setFavoriteAffirmation,
                  onRefresh: _refreshGoalsAffirmations,
                );
              } else if (_showDailyHistory) {
                overlay = DailyHistoryScreen(
                  state: _state,
                  summaries: _dailySummaries,
                  onBack: _closeDailyHistory,
                );
              } else if (_showProtectionDatabase) {
                overlay = ProtectionDatabaseScreen(
                  blockedDomains: _blockedDomains,
                  onBack: _closeProtectionDatabase,
                  onAddDomain: _addBlockedDomain,
                  onDeleteDomain: _deleteBlockedDomain,
                  onRefresh: _refreshBlockedDomains,
                );
              } else if (_showDebugCenter) {
                overlay = DebugCenterScreen(
                  state: _state,
                  attempts: _attempts,
                  onBack: _closeDebugCenter,
                  onResetAppData: _resetAppData,
                  onRefresh: _refreshAttempts,
                  onMarkAttemptRecovered: _markAttemptRecoveredById,
                );
              } else if (_showFocusTimer) {
                overlay = FocusTimerScreen(
                  onBack: _closeDisciplineTool,
                  onCompleted: _completeFocusSession,
                );
              } else if (_showConcentration) {
                overlay = ConcentrationScreen(
                  goals: _goals,
                  affirmations: _affirmations,
                  primaryAffirmation: _primaryAffirmation,
                  onBack: _closeDisciplineTool,
                  onCompleted: _completeConcentration,
                );
              } else if (_showReflection) {
                overlay = ReflectionScreen(
                  onBack: _closeDisciplineTool,
                  onSaved: _completeReflection,
                  lastReflectionText: _state.lastReflectionText,
                );
              } else if (_showAccessibilityDetection) {
                overlay = AccessibilityDetectionScreen(
                  onBack: _closeAccessibilityDetection,
                  blockedDomains: _blockedDomains
                      .map((item) => item.domain)
                      .toList(),
                );
              } else if (_showCloudSync) {
                overlay = CloudSyncScreen(
                  state: _state,
                  goals: _goals,
                  affirmations: _affirmations,
                  blockedDomains: _blockedDomains,
                  onBack: _closeCloudSync,
                );
              }

              if (overlay != null) {
                return Scaffold(
                  body: SafeArea(child: overlay),
                  bottomNavigationBar: FocusShieldBottomNav(
                    currentIndex: _selectedIndex,
                    onTap: _goTo,
                  ),
                );
              }

              final screens = [
                HomeScreen(
                  state: _state,
                  goals: _goals,
                  primaryAffirmation: _primaryAffirmation,
                  onNavigate: _goTo,
                  onListeningWin: _logListeningWin,
                ),
                ScannerScreen(
                  protectionEnabled: _state.protectionEnabled,
                  blockedDomains: _blockedDomains,
                  state: _state,
                  onDecision: _handleScannerDecision,
                ),
                
       RecoveryScreen(
  state: _state,
  onRecovered: _markRecovered,
  onOpenFocusTimer: _openFocusTimer,
  onOpenConcentration: _openConcentration,
  onOpenReflection: _openReflection,
),
                ProgressScreen(
                  state: _state,
                  onListeningWin: _logListeningWin,
                  onOpenFocusTimer: _openFocusTimer,
                  onOpenReflection: _openReflection,
                  onOpenConcentration: _openConcentration,
                  onOpenDailyHistory: _openDailyHistory,
                ),
                CoachScreen(
                  state: _state,
                  attempts: _attempts,
                  onMorningCommand: _setMorningCommand,
                  onEndReview: _saveEndReview,
                  onNavigate: _goTo,
                ),
                SettingsScreen(
                  state: _state,
                  onToggleProtection: _toggleProtection,
                  onSetCommitmentDays: _setCommitmentDays,
                  onOpenAccessibilitySettings: () {
                    _openAccessibilitySettings();
                  },
                  onOpenAccessibilityDetection: _openAccessibilityDetection,
                  onOpenProtectionDatabase: _openProtectionDatabase,
                  onOpenGoalsAffirmations: _openGoalsAffirmations,
                  onOpenDebugCenter: _openDebugCenter,
                  onOpenProductionReadiness: _openProductionReadiness,
                  onResetAppData: _resetAppData,
                  onOpenCloudSync: _openCloudSync,
                ),
              ];

              return Scaffold(
                body: SafeArea(
                  child: _showIntervention
                      ? InterventionScreen(
                          state: _state,
                          goals: _goals,
                          primaryAffirmation: _primaryAffirmation,
                          decision: _lastBlockedDecision,
                          onNavigate: _goTo,
                          onRecovered: _markRecovered,
                          onBackToScanner: _returnToScanner,
                        )
                      : IndexedStack(
                          index: _selectedIndex,
                          children: screens,
                        ),
                ),
                bottomNavigationBar: FocusShieldBottomNav(
                  currentIndex: _selectedIndex,
                  onTap: _goTo,
                ),
              );
            }
          }
          ''')
          # ------------------------------------------------------------
          # 9. Patch startup gate unlock rule
          #    The app unlock button should only work after:
          #    commitment selected + Accessibility opened + VPN setup notice opened.
          # ------------------------------------------------------------
          gate_path = root / "lib/presentation/screens/startup_commitment_gate_screen.dart"

          if gate_path.exists():
              gate_text = gate_path.read_text(encoding="utf-8")
              gate_text = gate_text.replace(
                  "onPressed: commitmentSet ? _finishSetup : null,",
                  "onPressed: commitmentSet && _stage >= 3 ? _finishSetup : null,",
              )
              gate_path.write_text(gate_text, encoding="utf-8")

          # ------------------------------------------------------------
          # 10. Ensure shared_preferences exists
          # ------------------------------------------------------------
          pubspec = root / "pubspec.yaml"

          if pubspec.exists():
              pubspec_text = pubspec.read_text(encoding="utf-8")

              if "shared_preferences:" not in pubspec_text:
                  pubspec_text = pubspec_text.replace(
                      "dependencies:\n",
                      "dependencies:\n  shared_preferences: ^2.3.5\n",
                      1,
                  )

              pubspec.write_text(pubspec_text, encoding="utf-8")

          # ------------------------------------------------------------
          # 11. Patch native Android completion alert
          #     Fixes: focus/concentration complete with no vibration/sound.
          # ------------------------------------------------------------
          main_activity = root / "android/app/src/main/kotlin/com/example/focus_shield_android/MainActivity.kt"

          if main_activity.exists():
              native_text = main_activity.read_text(encoding="utf-8")

              if '"playCompletionAlert"' not in native_text:
                  native_text = native_text.replace(
                      "else -> result.notImplemented()",
                      '"playCompletionAlert" -> playCompletionAlert(result)\n                          else -> result.notImplemented()',
                      1,
                  )

              if "private fun playCompletionAlert" not in native_text:
                  insert_at = native_text.rfind("}")

                  if insert_at == -1:
                      raise SystemExit("Could not find MainActivity closing brace.")

                  helper = r'''

              private fun playCompletionAlert(result: MethodChannel.Result) {
                  try {
                      val vibrator = getSystemService(android.content.Context.VIBRATOR_SERVICE)
                          as? android.os.Vibrator

                      if (android.os.Build.VERSION.SDK_INT >= android.os.Build.VERSION_CODES.O) {
                          vibrator?.vibrate(
                              android.os.VibrationEffect.createOneShot(
                                  650,
                                  android.os.VibrationEffect.DEFAULT_AMPLITUDE
                              )
                          )
                      } else {
                          @Suppress("DEPRECATION")
                          vibrator?.vibrate(650)
                      }

                      val uri = android.provider.Settings.System.DEFAULT_NOTIFICATION_URI
                      val ringtone = android.media.RingtoneManager.getRingtone(
                          applicationContext,
                          uri
                      )
                      ringtone?.play()

                      result.success("completion_alert_played")
                  } catch (_: Exception) {
                      result.success("completion_alert_unavailable")
                  }
              }
          '''
                  native_text = native_text[:insert_at] + helper + native_text[insert_at:]

              main_activity.write_text(native_text, encoding="utf-8")

          # ------------------------------------------------------------
          # 12. Add Android vibration permission
          # ------------------------------------------------------------
          manifest = root / "android/app/src/main/AndroidManifest.xml"

          if manifest.exists():
              manifest_text = manifest.read_text(encoding="utf-8")

              if "android.permission.VIBRATE" not in manifest_text:
                  manifest_text = manifest_text.replace(
                      "<application",
                      '<uses-permission android:name="android.permission.VIBRATE" />\n    <application',
                      1,
                  )

              manifest.write_text(manifest_text, encoding="utf-8")

          # ------------------------------------------------------------
          # 13. Keep widget test stable
          # ------------------------------------------------------------
          write("test/widget_test.dart", r'''
          import 'package:flutter_test/flutter_test.dart';

          void main() {
            testWidgets('Phase 6Q smoke test', (tester) async {
              expect(true, isTrue);
            });
          }
          ''')

          print("Phase 6Q real persistence, editable coach, alerts, and navigation patch applied.")
          PY

      - name: Apply Phase 6Q patch
        run: python3 tools/phase6q_real_persistence_coach_alerts.py
      - name: Verify Phase 6Q code changes
        run: |
          set -e

          echo "Checking Phase 6Q files..."

          test -f focus_shield_android/lib/presentation/services/phase6q_commitment_store.dart
          test -f focus_shield_android/lib/presentation/services/phase6q_completion_alerts.dart

          grep -q "Phase6QCommitmentStore" focus_shield_android/lib/app.dart
          grep -q "_startupGateComplete" focus_shield_android/lib/app.dart
          grep -q "StartupCommitmentGateScreen" focus_shield_android/lib/app.dart

          grep -q "onOpenFocusTimer: _openFocusTimer" focus_shield_android/lib/app.dart
          grep -q "onOpenConcentration: _openConcentration" focus_shield_android/lib/app.dart
          grep -q "onOpenReflection: _openReflection" focus_shield_android/lib/app.dart

          if grep -q "onFocusSession: _openFocusTimer" focus_shield_android/lib/app.dart; then
            echo "ERROR: Old wrong RecoveryScreen parameter still exists."
            exit 1
          fi

          grep -q "Morning Command" focus_shield_android/lib/presentation/screens/coach_screen.dart
          grep -q "Afternoon Command" focus_shield_android/lib/presentation/screens/coach_screen.dart
          grep -q "Evening Review" focus_shield_android/lib/presentation/screens/coach_screen.dart
          grep -q "TextField" focus_shield_android/lib/presentation/screens/coach_screen.dart

          grep -q "Phase6QCompletionAlerts.play" focus_shield_android/lib/presentation/screens/focus_timer_screen.dart
          grep -q "Phase6QCompletionAlerts.play" focus_shield_android/lib/presentation/screens/concentration_screen.dart

          grep -q "Daily Discipline Motivation" focus_shield_android/lib/presentation/screens/home_screen.dart

          if grep -q "Quick Actions" focus_shield_android/lib/presentation/screens/home_screen.dart; then
            echo "ERROR: Quick Actions still exists on Home."
            exit 1
          fi

          grep -q "playCompletionAlert" focus_shield_android/android/app/src/main/kotlin/com/example/focus_shield_android/MainActivity.kt
          grep -q "android.permission.VIBRATE" focus_shield_android/android/app/src/main/AndroidManifest.xml
          grep -q "shared_preferences:" focus_shield_android/pubspec.yaml

          echo "Phase 6Q verification passed."

