name: Phase 6Q Real Persistence Coach Alerts APK

on:
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Create Phase 6Q patch script
        run: |
          mkdir -p tools
          cat > tools/phase6q_real_persistence_coach_alerts.py <<'PY'
          from pathlib import Path
          import re

          root = Path("focus_shield_android")

          def write(relative_path: str, content: str):
              path = root / relative_path
              path.parent.mkdir(parents=True, exist_ok=True)
              path.write_text(content.strip() + "\n", encoding="utf-8")

          # ------------------------------------------------------------
          # 1. Durable commitment store
          #    Fixes: commitment disappearing/restarting after app close.
          #    This stores commitment in SharedPreferences as a backup
          #    source next to SQLite.
          # ------------------------------------------------------------
          write("lib/presentation/services/phase6q_commitment_store.dart", r'''
          import 'package:shared_preferences/shared_preferences.dart';

          import '../../domain/models/focus_shield_state.dart';

          class Phase6QCommitmentSnapshot {
            const Phase6QCommitmentSnapshot({
              required this.days,
              required this.startDate,
            });

            final int days;
            final String startDate;

            bool get isSet => days > 0 && startDate.trim().isNotEmpty;

            DateTime? get start => DateTime.tryParse(startDate);

            int get daysRemaining {
              final parsedStart = start;
              if (parsedStart == null || days <= 0) return 0;

              final end = parsedStart.add(Duration(days: days));
              final remaining = end.difference(DateTime.now()).inDays + 1;
              return remaining < 0 ? 0 : remaining;
            }

            bool get active => isSet && daysRemaining > 0;
          }

          class Phase6QCommitmentStore {
            const Phase6QCommitmentStore._();

            static const _daysKey = 'phase6q_commitment_days';
            static const _startKey = 'phase6q_commitment_start_date';
            static const _setupCompleteKey = 'phase6q_setup_complete';

            static Future<Phase6QCommitmentSnapshot?> load() async {
              final prefs = await SharedPreferences.getInstance();
              final days = prefs.getInt(_daysKey) ?? 0;
              final startDate = prefs.getString(_startKey) ?? '';

              if (days <= 0 || startDate.trim().isEmpty) return null;

              return Phase6QCommitmentSnapshot(
                days: days,
                startDate: startDate,
              );
            }

            static Future<void> save({
              required int days,
              required String startDate,
            }) async {
              final prefs = await SharedPreferences.getInstance();
              await prefs.setInt(_daysKey, days);
              await prefs.setString(_startKey, startDate);
            }

            static Future<void> saveFromState(FocusShieldState state) async {
              if (!state.commitmentSet) return;

              await save(
                days: state.commitmentDays,
                startDate: state.commitmentStartDate,
              );
            }

            static Future<void> applyToState(FocusShieldState state) async {
              final saved = await load();
              if (saved == null || !saved.active) return;

              state.commitmentDays = saved.days;
              state.commitmentStartDate = saved.startDate;
              state.protectionEnabled = true;
            }

            static Future<bool> setupComplete() async {
              final prefs = await SharedPreferences.getInstance();
              return prefs.getBool(_setupCompleteKey) ?? false;
            }

            static Future<void> markSetupComplete() async {
              final prefs = await SharedPreferences.getInstance();
              await prefs.setBool(_setupCompleteKey, true);
            }

            static Future<void> clear() async {
              final prefs = await SharedPreferences.getInstance();
              await prefs.remove(_daysKey);
              await prefs.remove(_startKey);
              await prefs.remove(_setupCompleteKey);
            }
          }
          ''')

          # ------------------------------------------------------------
          # 2. Startup gate screen
          #    Fixes: commitment must show first before daily app opens.
          # ------------------------------------------------------------
          write("lib/presentation/screens/startup_commitment_gate_screen.dart", r'''
          import 'package:flutter/material.dart';

          import '../../core/theme/app_theme.dart';
          import '../../domain/models/focus_shield_state.dart';
          import '../services/phase6q_commitment_store.dart';
          import '../widgets/action_button.dart';
          import '../widgets/shield_card.dart';

          class StartupCommitmentGateScreen extends StatefulWidget {
            const StartupCommitmentGateScreen({
              super.key,
              required this.state,
              required this.onSetCommitmentDays,
              required this.onOpenAccessibilitySettings,
              required this.onOpenVpnSetup,
              required this.onContinueToApp,
            });

            final FocusShieldState state;
            final ValueChanged<int> onSetCommitmentDays;
            final VoidCallback onOpenAccessibilitySettings;
            final VoidCallback onOpenVpnSetup;
            final VoidCallback onContinueToApp;

            @override
            State<StartupCommitmentGateScreen> createState() =>
                _StartupCommitmentGateScreenState();
          }

          class _StartupCommitmentGateScreenState
              extends State<StartupCommitmentGateScreen> {
            int _stage = 0;
            int _chosenDays = 0;

            Future<void> _chooseDays(int days) async {
              widget.onSetCommitmentDays(days);
              setState(() {
                _chosenDays = days;
                _stage = 1;
              });
            }

            Future<void> _finishSetup() async {
              await Phase6QCommitmentStore.markSetupComplete();
              widget.onContinueToApp();
            }

            @override
            Widget build(BuildContext context) {
              final commitmentSet = widget.state.commitmentSet || _chosenDays > 0;
              final chosenLabel = _chosenDays > 0
                  ? '$_chosenDays days'
                  : widget.state.commitmentSet
                      ? '${widget.state.commitmentDays} days'
                      : 'Not set';

              return Scaffold(
                body: SafeArea(
                  child: ListView(
                    padding: const EdgeInsets.all(18),
                    children: [
                      Text(
                        'Focus Shield Setup',
                        style: Theme.of(context).textTheme.headlineLarge,
                      ),
                      const SizedBox(height: 6),
                      const Text(
                        'Protection starts only after commitment and setup are confirmed.',
                      ),
                      const SizedBox(height: 18),

                      ShieldCard(
                        borderColor:
                            commitmentSet ? AppTheme.primary : AppTheme.warning,
                        child: Column(
                          crossAxisAlignment: CrossAxisAlignment.start,
                          children: [
                            const Text('Step 1 — Choose Commitment'),
                            const SizedBox(height: 8),
                            Text(
                              commitmentSet
                                  ? 'Commitment selected: $chosenLabel.'
                                  : 'Choose the number of days you are committing before the app unlocks.',
                            ),
                            const SizedBox(height: 12),
                            Wrap(
                              spacing: 8,
                              runSpacing: 8,
                              children: [
                                _CommitmentChoice(
                                  label: '7 days',
                                  selected: _chosenDays == 7 ||
                                      widget.state.commitmentDays == 7,
                                  onTap: () => _chooseDays(7),
                                ),
                                _CommitmentChoice(
                                  label: '14 days',
                                  selected: _chosenDays == 14 ||
                                      widget.state.commitmentDays == 14,
                                  onTap: () => _chooseDays(14),
                                ),
                                _CommitmentChoice(
                                  label: '30 days',
                                  selected: _chosenDays == 30 ||
                                      widget.state.commitmentDays == 30,
                                  onTap: () => _chooseDays(30),
                                ),
                                _CommitmentChoice(
                                  label: '90 days',
                                  selected: _chosenDays == 90 ||
                                      widget.state.commitmentDays == 90,
                                  onTap: () => _chooseDays(90),
                                ),
                                _CommitmentChoice(
                                  label: '365 days',
                                  selected: _chosenDays == 365 ||
                                      widget.state.commitmentDays == 365,
                                  onTap: () => _chooseDays(365),
                                ),
                              ],
                            ),
                          ],
                        ),
                      ),

                      ShieldCard(
                        borderColor:
                            _stage >= 1 ? AppTheme.primary : AppTheme.secondary,
                        child: Column(
                          crossAxisAlignment: CrossAxisAlignment.start,
                          children: [
                            const Text('Step 2 — Enable Accessibility'),
                            const SizedBox(height: 8),
                            const Text(
                              'Open Android Accessibility settings and enable Focus Shield so visible website text can be checked by the local protection layer.',
                            ),
                            const SizedBox(height: 12),
                            ActionButton(
                              label: 'Open Accessibility Settings',
                              subtitle: 'Enable Focus Shield manually',
                              onPressed: commitmentSet
                                  ? () {
                                      widget.onOpenAccessibilitySettings();
                                      setState(() => _stage = 2);
                                    }
                                  : null,
                            ),
                          ],
                        ),
                      ),

                      ShieldCard(
                        borderColor:
                            _stage >= 2 ? AppTheme.primary : AppTheme.secondary,
                        child: Column(
                          crossAxisAlignment: CrossAxisAlignment.start,
                          children: [
                            const Text('Step 3 — VPN Setup Notice'),
                            const SizedBox(height: 8),
                            const Text(
                              'System-wide VPN filtering is still paused while the DNS route issue is repaired. Accessibility detection remains the active protection layer.',
                            ),
                            const SizedBox(height: 12),
                            ActionButton(
                              label: 'Open VPN Settings',
                              subtitle: 'Optional system setup screen',
                              onPressed: commitmentSet
                                  ? () {
                                      widget.onOpenVpnSetup();
                                      setState(() => _stage = 3);
                                    }
                                  : null,
                            ),
                          ],
                        ),
                      ),

                      ShieldCard(
                        borderColor:
                            _stage >= 1 ? AppTheme.primary : AppTheme.warning,
                        child: Column(
                          crossAxisAlignment: CrossAxisAlignment.start,
                          children: [
                            const Text('Step 4 — Unlock Daily App'),
                            const SizedBox(height: 8),
                            const Text(
                              'After commitment is set, the daily discipline and protection dashboard can open.',
                            ),
                            const SizedBox(height: 12),
                            ActionButton(
                              label: 'Continue to Focus Shield',
                              subtitle: 'Open daily protection dashboard',
                              onPressed: commitmentSet ? _finishSetup : null,
                            ),
                          ],
                        ),
                      ),

                      ShieldCard(
                        borderColor: AppTheme.warning,
                        child: const Text(
                          'Note: a normal Android app cannot make itself impossible to uninstall. Focus Shield can add commitment locks, warnings, Accessibility/VPN setup, and tamper-resistance friction, but Android still controls uninstall permissions.',
                        ),
                      ),
                    ],
                  ),
                ),
              );
            }
          }

          class _CommitmentChoice extends StatelessWidget {
            const _CommitmentChoice({
              required this.label,
              required this.selected,
              required this.onTap,
            });

            final String label;
            final bool selected;
            final VoidCallback onTap;

            @override
            Widget build(BuildContext context) {
              return OutlinedButton.icon(
                onPressed: selected ? null : onTap,
                icon: Icon(
                  selected
                      ? Icons.check_circle_rounded
                      : Icons.lock_clock_rounded,
                ),
                label: Text(label),
              );
            }
          }
          ''')

          # ------------------------------------------------------------
          # 3. Completion alert service
          #    Fixes: no sound/vibration when focus/concentration finishes.
          #    It uses Flutter haptics + sound and also calls native Android
          #    when available.
          # ------------------------------------------------------------
          write("lib/presentation/services/phase6q_completion_alerts.dart", r'''
          import 'package:flutter/material.dart';
          import 'package:flutter/services.dart';

          class Phase6QCompletionAlerts {
            const Phase6QCompletionAlerts._();

            static const _channel = MethodChannel('focus_shield/protection');

            static Future<void> play(
              BuildContext context,
              String message,
            ) async {
              try {
                await HapticFeedback.heavyImpact();
                await HapticFeedback.vibrate();
                await SystemSound.play(SystemSoundType.alert);
                await _channel.invokeMethod('playCompletionAlert');
              } catch (_) {
                try {
                  await HapticFeedback.mediumImpact();
                } catch (_) {}
              }

              if (!context.mounted) return;

              ScaffoldMessenger.of(context).showSnackBar(
                SnackBar(
                  content: Text(message),
                  duration: const Duration(seconds: 3),
                ),
              );
            }
          }
          ''')
          # ------------------------------------------------------------
          # 4. Replace Home screen
          #    Fixes: Quick Actions card still showing.
          #    Keeps Home focused on protection, daily mission, goals,
          #    and daily discipline motivation.
          # ------------------------------------------------------------
          write("lib/presentation/screens/home_screen.dart", r'''
          import 'package:flutter/material.dart';

          import '../../core/constants/app_constants.dart';
          import '../../core/theme/app_theme.dart';
          import '../../domain/models/focus_shield_state.dart';
          import '../widgets/action_button.dart';
          import '../widgets/native_protection_counters_card.dart';
          import '../widgets/protection_status_center_card.dart';
          import '../widgets/shield_card.dart';
          import '../widgets/stat_grid.dart';

          class HomeScreen extends StatelessWidget {
            const HomeScreen({
              super.key,
              required this.state,
              required this.goals,
              required this.primaryAffirmation,
              required this.onNavigate,
              required this.onListeningWin,
            });

            final FocusShieldState state;
            final List<dynamic> goals;
            final String primaryAffirmation;
            final ValueChanged<int> onNavigate;
            final VoidCallback onListeningWin;

            String get _dailyMotivation {
              final messages = [
                'Pause first. Choose your future before your feelings choose for you.',
                'Your dreams need today’s discipline, not tomorrow’s apology.',
                'Return to the mission immediately after every distraction.',
                'Small wins repeated daily become identity.',
                'Listen fully, move deliberately, and protect your goals.',
              ];

              final day = DateTime.tryParse(state.lastActiveDate)?.day ?? DateTime.now().day;
              return messages[day % messages.length];
            }

            @override
            Widget build(BuildContext context) {
              final visibleGoals = goals.take(3).toList();

              return ListView(
                padding: const EdgeInsets.all(18),
                children: [
                  Text(
                    AppConstants.appName,
                    style: Theme.of(context).textTheme.headlineLarge,
                  ),
                  const SizedBox(height: 4),
                  const Text('Discipline + protection dashboard'),
                  Text('Active day: ${state.lastActiveDate}'),
                  const SizedBox(height: 18),

                  if (!state.commitmentSet)
                    ShieldCard(
                      borderColor: AppTheme.warning,
                      child: Column(
                        crossAxisAlignment: CrossAxisAlignment.start,
                        children: [
                          const Text('Commitment required'),
                          const SizedBox(height: 8),
                          const Text(
                            'Choose 7, 14, 30, 90, or 365 days before protection can activate.',
                          ),
                          const SizedBox(height: 12),
                          ActionButton(
                            label: 'Set Commitment',
                            subtitle: 'Go to Settings',
                            onPressed: () => onNavigate(5),
                          ),
                        ],
                      ),
                    )
                  else
                    NativeHomeProtectionSummaryCard(
                      commitmentLabel: 'Active',
                      daysLeftLabel: '${state.commitmentDaysRemaining} days left',
                    ),

                  const SizedBox(height: 16),

                  const ProtectionStatusCenterCard(
                    title: 'Protection Health — Production Readiness',
                  ),

                  const SizedBox(height: 16),

                  ShieldCard(
                    borderColor: AppTheme.secondary,
                    child: Column(
                      crossAxisAlignment: CrossAxisAlignment.start,
                      children: [
                        const Text('Daily Discipline Motivation'),
                        const SizedBox(height: 10),
                        Text(
                          '“$_dailyMotivation”',
                          style: Theme.of(context).textTheme.headlineMedium?.copyWith(
                                color: Colors.lightBlueAccent,
                              ),
                        ),
                      ],
                    ),
                  ),

                  ShieldCard(
                    child: Column(
                      crossAxisAlignment: CrossAxisAlignment.start,
                      children: [
                        const Text('Today’s Mission'),
                        Text(
                          '${state.listeningWinsToday} / ${state.missionTarget}',
                          style: Theme.of(context).textTheme.headlineMedium?.copyWith(
                                color: state.missionComplete
                                    ? AppTheme.primary
                                    : AppTheme.warning,
                              ),
                        ),
                        const Text(
                          'Pause and fully listen before speaking at least 3 times today.',
                        ),
                        const SizedBox(height: 12),
                        ActionButton(
                          label: 'Log Listening Win',
                          subtitle: '+10 XP',
                          onPressed: onListeningWin,
                        ),
                      ],
                    ),
                  ),

                  ShieldCard(
                    borderColor: AppTheme.secondary,
                    child: StatGrid(
                      items: {
                        'Shield': state.protectionEnabled ? 'Active' : 'Off',
                        'Recovery': '${state.recoveryRate}%',
                        'Level': '${state.level}',
                        'XP': '${state.xpInCurrentLevel}/${state.xpForNextLevel}',
                        'Streak': '${state.currentStreak}',
                        'Best': '${state.longestStreak}',
                      },
                    ),
                  ),

                  ShieldCard(
                    borderColor: AppTheme.primary,
                    child: Column(
                      crossAxisAlignment: CrossAxisAlignment.start,
                      children: [
                        const Text('My Goals'),
                        const SizedBox(height: 8),
                        if (visibleGoals.isEmpty)
                          const Text('No goals saved yet.')
                        else
                          ...visibleGoals.map(
                            (goal) => Padding(
                              padding: const EdgeInsets.only(bottom: 8),
                              child: Text('• ${goal.title}'),
                            ),
                          ),
                        const SizedBox(height: 12),
                        ActionButton(
                          label: 'Edit Goals & Affirmations',
                          subtitle: 'Go to Settings manager',
                          onPressed: () => onNavigate(5),
                        ),
                      ],
                    ),
                  ),

                  ShieldCard(
                    borderColor: AppTheme.primary,
                    child: Text(
                      '“$primaryAffirmation”',
                      style: Theme.of(context).textTheme.headlineMedium?.copyWith(
                            color: Colors.lightBlueAccent,
                          ),
                    ),
                  ),
                ],
              );
            }
          }
          ''')

          # ------------------------------------------------------------
          # 5. Replace Coach screen with editable commands
          #    Fixes: Morning/Afternoon/Evening buttons appeared but
          #    did not allow writing or saving commands like the web page.
          # ------------------------------------------------------------
          write("lib/presentation/screens/coach_screen.dart", r'''
          import 'package:flutter/material.dart';
          import 'package:shared_preferences/shared_preferences.dart';

          import '../../core/theme/app_theme.dart';
          import '../../domain/models/attempt_record.dart';
          import '../../domain/models/focus_shield_state.dart';
          import '../widgets/action_button.dart';
          import '../widgets/shield_card.dart';
          import '../widgets/stat_grid.dart';

          class CoachScreen extends StatefulWidget {
            const CoachScreen({
              super.key,
              required this.state,
              required this.attempts,
              required this.onMorningCommand,
              required this.onEndReview,
              this.onNavigate,
            });

            final FocusShieldState state;
            final List<AttemptRecord> attempts;
            final VoidCallback onMorningCommand;
            final VoidCallback onEndReview;
            final ValueChanged<int>? onNavigate;

            @override
            State<CoachScreen> createState() => _CoachScreenState();
          }

          class _CoachScreenState extends State<CoachScreen> {
            final _morningController = TextEditingController();
            final _afternoonController = TextEditingController();
            final _eveningController = TextEditingController();

            bool _loaded = false;
            bool _morningSaved = false;
            bool _afternoonSaved = false;
            bool _eveningSaved = false;

            String get _dayKey => widget.state.lastActiveDate;

            String get _dailyMotivation {
              final messages = [
                'Pause first. Choose your future before your feelings choose for you.',
                'You do not need perfect feelings. You need one disciplined action.',
                'Return quickly. The faster you return, the stronger you become.',
                'Today is won through small promises kept.',
                'Listen fully, act calmly, and protect your dreams.',
              ];

              final day = DateTime.tryParse(_dayKey)?.day ?? DateTime.now().day;
              return messages[day % messages.length];
            }

            int get _coachScore {
              var score = 0;
              if (_morningSaved) score += 25;
              if (_afternoonSaved) score += 20;
              if (_eveningSaved) score += 20;
              score += (widget.state.missionScore * 0.2).round();
              score += (widget.state.recoveryRate * 0.15).round();
              return score.clamp(0, 100);
            }

            @override
            void initState() {
              super.initState();
              _loadCommands();
            }

            @override
            void dispose() {
              _morningController.dispose();
              _afternoonController.dispose();
              _eveningController.dispose();
              super.dispose();
            }

            Future<void> _loadCommands() async {
              final prefs = await SharedPreferences.getInstance();

              final morning =
                  prefs.getString('phase6q_morning_command_$_dayKey') ?? '';
              final afternoon =
                  prefs.getString('phase6q_afternoon_command_$_dayKey') ?? '';
              final evening =
                  prefs.getString('phase6q_evening_review_$_dayKey') ?? '';

              if (!mounted) return;

              setState(() {
                _morningController.text = morning;
                _afternoonController.text = afternoon;
                _eveningController.text = evening;
                _morningSaved = morning.trim().isNotEmpty;
                _afternoonSaved = afternoon.trim().isNotEmpty;
                _eveningSaved = evening.trim().isNotEmpty;
                _loaded = true;
              });
            }

            Future<void> _saveMorning() async {
              final text = _morningController.text.trim();
              if (text.isEmpty) {
                _showMessage('Write your morning command first.');
                return;
              }

              final prefs = await SharedPreferences.getInstance();
              await prefs.setString('phase6q_morning_command_$_dayKey', text);

              if (!mounted) return;

              setState(() => _morningSaved = true);
              widget.onMorningCommand();
              _showMessage('Morning command saved.');
            }

            Future<void> _saveAfternoon() async {
              final text = _afternoonController.text.trim();
              if (text.isEmpty) {
                _showMessage('Write your afternoon command first.');
                return;
              }

              final prefs = await SharedPreferences.getInstance();
              await prefs.setString('phase6q_afternoon_command_$_dayKey', text);

              if (!mounted) return;

              setState(() => _afternoonSaved = true);
              _showMessage('Afternoon command saved.');
            }

            Future<void> _saveEvening() async {
              final text = _eveningController.text.trim();
              if (text.isEmpty) {
                _showMessage('Write your evening review first.');
                return;
              }

              final prefs = await SharedPreferences.getInstance();
              await prefs.setString('phase6q_evening_review_$_dayKey', text);

              if (!mounted) return;

              setState(() => _eveningSaved = true);
              widget.onEndReview();
              _showMessage('Evening review saved.');
            }

            void _showMessage(String message) {
              ScaffoldMessenger.of(context).showSnackBar(
                SnackBar(
                  content: Text(message),
                  duration: const Duration(seconds: 2),
                ),
              );
            }

            @override
            Widget build(BuildContext context) {
              if (!_loaded) {
                return const Center(child: Text('Loading Coach...'));
              }

              return ListView(
                padding: const EdgeInsets.all(18),
                children: [
                  Text('Coach', style: Theme.of(context).textTheme.headlineLarge),
                  const SizedBox(height: 4),
                  const Text('Daily command center'),
                  Text('Active day: $_dayKey'),
                  const SizedBox(height: 18),

                  ShieldCard(
                    borderColor: AppTheme.warning,
                    child: Column(
                      crossAxisAlignment: CrossAxisAlignment.start,
                      children: [
                        const Text('Daily Discipline Motivation'),
                        const SizedBox(height: 10),
                        Text(
                          '“$_dailyMotivation”',
                          style: Theme.of(context).textTheme.headlineMedium?.copyWith(
                                color: Colors.lightBlueAccent,
                              ),
                        ),
                        const SizedBox(height: 12),
                        const Text(
                          'Reminder: set Morning, Afternoon, and Evening commands before the day ends.',
                        ),
                      ],
                    ),
                  ),

                  ShieldCard(
                    borderColor: AppTheme.secondary,
                    child: StatGrid(
                      items: {
                        'Coach Score': '$_coachScore%',
                        'Morning': _morningSaved ? 'Set' : 'Missing',
                        'Afternoon': _afternoonSaved ? 'Set' : 'Missing',
                        'Evening': _eveningSaved ? 'Set' : 'Missing',
                        'Recovery': '${widget.state.recoveryRate}%',
                        'Pending': '${widget.state.pendingRecoveries}',
                      },
                    ),
                  ),

                  _CommandCard(
                    title: 'Morning Command',
                    description:
                        'Set your standard before the day starts: pause, listen, and protect your goals.',
                    controller: _morningController,
                    saved: _morningSaved,
                    hint: 'Today I will pause before speaking and choose my goals first.',
                    buttonLabel: 'Save Morning Command',
                    buttonSubtitle: '+10 XP first time saved today',
                    onSave: _saveMorning,
                  ),

                  _CommandCard(
                    title: 'Afternoon Command',
                    description:
                        'Midday reset: return to your mission before tiredness or emotion takes control.',
                    controller: _afternoonController,
                    saved: _afternoonSaved,
                    hint: 'For the second half of today, I return to discipline immediately.',
                    buttonLabel: 'Save Afternoon Command',
                    buttonSubtitle: 'Refocus for the second half',
                    onSave: _saveAfternoon,
                  ),

                  _CommandCard(
                    title: 'Evening Review',
                    description:
                        'Close the day properly: review what pulled you away, what you recovered from, and what standard you will protect tomorrow.',
                    controller: _eveningController,
                    saved: _eveningSaved,
                    hint: 'Today I did well at... Tomorrow I will improve by...',
                    buttonLabel: 'Save Evening Review',
                    buttonSubtitle: '+15 XP first time saved today',
                    onSave: _saveEvening,
                    maxLines: 5,
                  ),

                  ShieldCard(
                    borderColor: AppTheme.warning,
