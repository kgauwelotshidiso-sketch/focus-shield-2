          if "_openVpnSetup()" not in text:
              anchor = "Future _openAccessibilitySettings() async { await ProtectionChannel().openAccessibilitySettings(); }"
              replacement = (
                  "Future _openAccessibilitySettings() async { await ProtectionChannel().openAccessibilitySettings(); }\n"
                  "Future _openVpnSetup() async { await ProtectionChannel().openVpnSettings(); }"
              )
              if anchor not in text:
