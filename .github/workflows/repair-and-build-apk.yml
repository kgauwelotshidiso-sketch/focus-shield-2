name: Repair and Build Focus Shield APK

on:
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  repair-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Repair Kotlin status type conversions
        run: |
          # 1. Create a dedicated utilities file to avoid scope and top-level declaration errors
          cat << 'EOF' > focus_shield_android/android/app/src/main/kotlin/com/example/focus_shield_android/FocusShieldUtils.kt
          package com.example.focus_shield_android

          fun Any?.focusShieldStatusInt(): Int {
              if (this == null) return 0
              return when (this) {
                  is Number -> this.toInt()
                  is String -> this.toIntOrNull() ?: 0
                  is Boolean -> if (this) 1 else 0
                  else -> 0
              }
          }

          fun Any?.focusShieldStatusLong(): Long {
              if (this == null) return 0L
              return when (this) {
                  is Number -> this.toLong()
                  is String -> this.toLongOrNull() ?: 0L
                  is Boolean -> if (this) 1L else 0L
                  else -> 0L
              }
          }

          fun Any?.focusShieldStatusString(): String {
              return this?.toString() ?: "-"
          }
          EOF

          # 2. Repair the corrupted Protection Status file
          python3 - <<'PY'
          from pathlib import Path
          import re

          p = Path("focus_shield_android/android/app/src/main/kotlin/com/example/focus_shield_android/FocusShieldProtectionStatus.kt")
          s = p.read_text()

          # Strip out the broken appended helpers that caused the syntax errors
          if "private fun Any?.focusShieldStatus" in s:
              s = s.split("private fun Any?.focusShieldStatus")[0]

          # Strip out old broken mappings and lowercase 'toint()' typos
          s = re.sub(r"\.focusShieldStatus(Int|Long|String)\(\)", "", s)
          s = s.replace(".toint()", "")
          s = re.sub(r"\(+(.+?)\)+", r"\1", s)

          lines = s.splitlines()
          out = []

          assignment_pattern = re.compile(r"^(\s*)([A-Za-z_][A-Za-z0-9_]*)\s*=\s*(.+?)(,?\s*)$")

          for line in lines:
              match = assignment_pattern.match(line)
              if match:
                  indent, name, rhs, tail = match.groups()
                  clean_rhs = rhs.replace(".toInt()", "").replace(".toLong()", "").strip()
                  
                  # Safely categorize into Int or Long based on the field name
                  if name in ["blockedQueries", "queriesCount", "allowedQueries"] or "Id" in name or "Index" in name:
                      out.append(f"{indent}{name} = ({clean_rhs}).focusShieldStatusInt(){tail}")
                  elif name in ["bytes", "packets", "timestamp", "totalQueries"]:
                      out.append(f"{indent}{name} = ({clean_rhs}).focusShieldStatusLong(){tail}")
                  else:
                      out.append(f"{indent}{name} = ({clean_rhs}).focusShieldStatusLong(){tail}")
              else:
                  out.append(line)

          p.write_text("\n".join(out) + "\n")
          print("Kotlin syntax repaired and utilities isolated.")
          PY

      - name: Commit repair if changed
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add focus_shield_android/android/app/src/main/kotlin/com/example/focus_shield_android/FocusShieldUtils.kt
          git add focus_shield_android/android/app/src/main/kotlin/com/example/focus_shield_android/FocusShieldProtectionStatus.kt
          git diff --cached --quiet || git commit -m "Repair protection status conversions and isolate utilities"
          git push

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Configure Gradle memory
        run: |
          mkdir -p ~/.gradle
          cat > ~/.gradle/gradle.properties <<'EOF'
          org.gradle.daemon=false
          org.gradle.parallel=false
          org.gradle.configureondemand=false
          org.gradle.caching=false
          org.gradle.workers.max=2
          org.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=1024m -Dfile.encoding=UTF-8
          kotlin.compiler.execution.strategy=in-process
          android.useAndroidX=true
          android.enableJetifier=true
          EOF

      - name: Get Flutter packages
        working-directory: focus_shield_android
        run: flutter pub get

      - name: Analyze
        working-directory: focus_shield_android
        run: flutter analyze

      - name: Run tests
        working-directory: focus_shield_android
        run: flutter test

      - name: Build debug APK
        working-directory: focus_shield_android
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=1024m -Dfile.encoding=UTF-8"
          JAVA_TOOL_OPTIONS: "-Xmx4096m"
        run: flutter build apk --debug

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: focus-shield-debug-apk
          path: focus_shield_android/build/app/outputs/flutter-apk/app-debug.apk
