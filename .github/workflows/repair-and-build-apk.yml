name: Repair and Build Focus Shield APK

on:
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  repair-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Repair Kotlin status type conversions
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re

          p = Path("focus_shield_android/android/app/src/main/kotlin/com/example/focus_shield_android/FocusShieldProtectionStatus.kt")

          s = p.read_text()
          before = s

          helpers = """

          private fun Any?.focusShieldStatusInt(): Int {
              return when (this) {
                  is Int -> this
                  is Long -> this.toInt()
                  is Short -> this.toInt()
                  is Byte -> this.toInt()
                  is Double -> this.toInt()
                  is Float -> this.toInt()
                  is String -> this.toIntOrNull() ?: 0
                  is Boolean -> if (this) 1 else 0
                  else -> 0
              }
          }

          private fun Any?.focusShieldStatusLong(): Long {
              return when (this) {
                  is Long -> this
                  is Int -> this.toLong()
                  is Short -> this.toLong()
                  is Byte -> this.toLong()
                  is Double -> this.toLong()
                  is Float -> this.toLong()
                  is String -> this.toLongOrNull() ?: 0L
                  is Boolean -> if (this) 1L else 0L
                  else -> 0L
              }
          }

          private fun Any?.focusShieldStatusString(): String {
              return this?.toString() ?: "-"
          }
          """

          if "focusShieldStatusInt()" not in s:
              s = s.rstrip() + helpers + "\n"

          field_types = {}
          for match in re.finditer(
              r"\\bval\\s+([A-Za-z_][A-Za-z0-9_]*)\\s*:\\s*([A-Za-z0-9_?<>.]+)",
              s,
          ):
              field_types[match.group(1)] = match.group(2)

          def strip_bad_casts(value: str) -> str:
              value = value.strip()
              changed = True
              while changed:
                  changed = False
                  for suffix in [
                      ".toInt()",
                      ".toLong()",
                      ".toString()",
                      ".focusShieldStatusInt()",
                      ".focusShieldStatusLong()",
                      ".focusShieldStatusString()",
                  ]:
                      if value.endswith(suffix):
                          value = value[: -len(suffix)].strip()
                          changed = True

                  if value.startswith("(") and value.endswith(")"):
                      inner = value[1:-1].strip()
                      depth = 0
                      balanced = True
                      for ch in inner:
                          if ch == "(":
                              depth += 1
                          elif ch == ")":
                              depth -= 1
                              if depth < 0:
                                  balanced = False
                                  break
                      if balanced and depth == 0:
                          value = inner
                          changed = True

              return value.strip()

          assignment_pattern = re.compile(
              r"^(\\s*)([A-Za-z_][A-Za-z0-9_]*)\\s*=\\s*(.+?)(,?\\s*)$"
          )

          out = []

          for line in s.splitlines():
              match = assignment_pattern.match(line)

              if not match:
                  out.append(line)
                  continue

              indent, name, rhs, tail = match.groups()
              expected = field_types.get(name)

              if not expected:
                  out.append(line)
                  continue

              clean = strip_bad_casts(rhs)

              if expected.startswith("Int"):
                  out.append(f"{indent}{name} = ({clean}).focusShieldStatusInt(){tail}")
              elif expected.startswith("Long"):
                  out.append(f"{indent}{name} = ({clean}).focusShieldStatusLong(){tail}")
              elif expected.startswith("String"):
                  out.append(f"{indent}{name} = ({clean}).focusShieldStatusString(){tail}")
              else:
                  out.append(line)

          s = "\\n".join(out) + "\\n"
          p.write_text(s)

          print("Changed:", s != before)
          print("Repaired:", p)
          PY

      - name: Commit repair if changed
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add focus_shield_android/android/app/src/main/kotlin/com/example/focus_shield_android/FocusShieldProtectionStatus.kt
          git diff --cached --quiet || git commit -m "Repair protection status conversions from GitHub Actions"
          git push

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Configure Gradle memory
        run: |
          mkdir -p ~/.gradle
          cat > ~/.gradle/gradle.properties <<'EOF'
          org.gradle.daemon=false
          org.gradle.parallel=false
          org.gradle.configureondemand=false
          org.gradle.caching=false
          org.gradle.workers.max=2
          org.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=1024m -Dfile.encoding=UTF-8
          kotlin.compiler.execution.strategy=in-process
          android.useAndroidX=true
          android.enableJetifier=true
          EOF

      - name: Get Flutter packages
        working-directory: focus_shield_android
        run: flutter pub get

      - name: Analyze
        working-directory: focus_shield_android
        run: flutter analyze

      - name: Run tests
        working-directory: focus_shield_android
        run: flutter test

      - name: Build debug APK
        working-directory: focus_shield_android
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=1024m -Dfile.encoding=UTF-8"
          JAVA_TOOL_OPTIONS: "-Xmx4096m"
        run: flutter build apk --debug

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: focus-shield-debug-apk
          path: focus_shield_android/build/app/outputs/flutter-apk/app-debug.apk
