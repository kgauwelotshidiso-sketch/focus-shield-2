name: Phase 6M Home Commitment Source APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - ".github/workflows/phase-6m-home-commitment-source.yml"

permissions:
  contents: write
  actions: read

jobs:
  phase-6m:
    runs-on: ubuntu-latest

    env:
      GRADLE_OPTS: -Dorg.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=1024m -Dfile.encoding=UTF-8
      JAVA_TOOL_OPTIONS: -Xmx4096m

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Create Phase 6M repair script
        run: |
          mkdir -p tools
          cat > tools/phase6m_home_commitment_source.py <<'PY'
          from pathlib import Path
          import textwrap

          ROOT = Path("focus_shield_android")

          def write(relative, content):
              target = ROOT / relative
              target.parent.mkdir(parents=True, exist_ok=True)
              target.write_text(textwrap.dedent(content).strip() + "\n", encoding="utf-8")

          write("lib/presentation/screens/home_screen.dart", r'''
          import 'package:flutter/material.dart';
          import 'package:shared_preferences/shared_preferences.dart';

          import '../services/protection_truth_service.dart';
          import '../widgets/protection_truth_cards.dart';

          class HomeScreen extends StatefulWidget {
            const HomeScreen({
              super.key,
              this.state,
              this.appState,
              this.currentState,
              this.focusShieldState,
              this.repository,
              this.appStateRepository,
              this.protectionStatus,
              this.nativeStatus,
              this.status,
              this.goals,
              this.affirmations,
              this.primaryAffirmation,
              this.attempts,
              this.dailySummaries,
              this.selectedIndex,
              this.currentIndex,
              this.activeIndex,
              this.index,
              this.onStateChanged,
              this.onRefresh,
              this.onRefreshStatus,
              this.onStatusRefresh,
              this.onTabSelected,
              this.onNavigate,
              this.onNavigateToIndex,
              this.onDestinationSelected,
              this.onIndexChanged,
              this.onSectionSelected,
              this.onOpenScanner,
              this.onOpenRecovery,
              this.onOpenProgress,
              this.onOpenCoach,
              this.onOpenSettings,
              this.onOpenGoals,
              this.onOpenAffirmations,
              this.onLogListeningWin,
              this.onListeningWin,
              this.onLogWin,
              this.onStartFocus,
              this.onCompleteReflection,
              this.onCompleteConcentration,
            });

            final Object? state;
            final Object? appState;
            final Object? currentState;
            final Object? focusShieldState;
            final Object? repository;
            final Object? appStateRepository;
            final Object? protectionStatus;
            final Object? nativeStatus;
            final Object? status;
            final Object? goals;
            final Object? affirmations;
            final Object? primaryAffirmation;
            final Object? attempts;
            final Object? dailySummaries;

            final Object? selectedIndex;
            final Object? currentIndex;
            final Object? activeIndex;
            final Object? index;

            final Object? onStateChanged;
            final Object? onRefresh;
            final Object? onRefreshStatus;
            final Object? onStatusRefresh;
            final Object? onTabSelected;
            final Object? onNavigate;
            final Object? onNavigateToIndex;
            final Object? onDestinationSelected;
            final Object? onIndexChanged;
            final Object? onSectionSelected;
            final Object? onOpenScanner;
            final Object? onOpenRecovery;
            final Object? onOpenProgress;
            final Object? onOpenCoach;
            final Object? onOpenSettings;
            final Object? onOpenGoals;
            final Object? onOpenAffirmations;
            final Object? onLogListeningWin;
            final Object? onListeningWin;
            final Object? onLogWin;
            final Object? onStartFocus;
            final Object? onCompleteReflection;
            final Object? onCompleteConcentration;

            @override
            State<HomeScreen> createState() => _HomeScreenState();
          }

          class _HomeCommitmentStatus {
            const _HomeCommitmentStatus({
              required this.active,
              required this.daysLeft,
            });

            final bool active;
            final int daysLeft;
          }

          class _HomeScreenState extends State<HomeScreen> {
            static const Color _background = Color(0xFF020617);
            static const Color _card = Color(0xFF0E1A2F);
            static const Color _green = Color(0xFF22C55E);
            static const Color _blue = Color(0xFF38BDF8);

            ProtectionTruthSnapshot? _snapshot;
            bool _loading = true;
            int _listeningWins = 0;
            int _xp = 0;
            bool _commitmentActive = false;
            int _commitmentDaysLeft = 0;

            @override
            void initState() {
              super.initState();
              _load();
            }

            Future<void> _load() async {
              setState(() => _loading = true);

              final prefs = await SharedPreferences.getInstance();
              final commitment = _readCommitmentStatus(prefs);
              final snapshot = await ProtectionTruthService.load(
                nativeStatus: widget.nativeStatus ?? widget.status ?? widget.protectionStatus,
              );

              if (!mounted) return;
              setState(() {
                _snapshot = snapshot;
                _commitmentActive = commitment.active;
                _commitmentDaysLeft = commitment.daysLeft;
                _listeningWins = prefs.getInt('phase6l_listening_wins') ?? 0;
                _xp = prefs.getInt('phase6l_xp') ?? 0;
                _loading = false;
              });
            }

            _HomeCommitmentStatus _readCommitmentStatus(SharedPreferences prefs) {
              final keys = prefs.getKeys();

              bool explicitActive = false;
              final remainingCandidates = <int>[];
              final durationCandidates = <int>[];
              final startCandidates = <int>[];

              for (final key in keys) {
                final lower = key.toLowerCase();
                final relevant = lower.contains('commit') || lower.contains('lock');

                if (!relevant) continue;

                final value = prefs.get(key);

                if (value is bool && value == true) {
                  explicitActive = true;
                }

                if (value is int) {
                  if (value <= 0) continue;

                  if (lower.contains('remaining') ||
                      lower.contains('daysleft') ||
                      lower.contains('days_left')) {
                    if (value <= 3650) remainingCandidates.add(value);
                    continue;
                  }

                  if (lower.contains('start') ||
                      lower.contains('created') ||
                      lower.contains('began') ||
                      lower.contains('activated')) {
                    startCandidates.add(value);
                    continue;
                  }

                  if (lower.contains('day')) {
                    if (value <= 3650) durationCandidates.add(value);
                  }
                }
              }

              int? smallest(List<int> values) {
                int? best;
                for (final value in values) {
                  if (value <= 0) continue;
                  if (best == null || value < best) best = value;
                }
                return best;
              }

              final directRemaining = smallest(remainingCandidates);
              if (directRemaining != null) {
                return _HomeCommitmentStatus(
                  active: true,
                  daysLeft: directRemaining.clamp(1, 3650),
                );
              }

              final selectedDuration = smallest(durationCandidates);
              if (selectedDuration == null) {
                return const _HomeCommitmentStatus(active: false, daysLeft: 0);
              }

              if (selectedDuration == 365 && !explicitActive && startCandidates.isEmpty) {
                return const _HomeCommitmentStatus(active: false, daysLeft: 0);
              }

              if (startCandidates.isNotEmpty) {
                var startMs = startCandidates.first;
                for (final candidate in startCandidates) {
                  if (candidate > startMs) startMs = candidate;
                }

                if (startMs < 1000000000000) {
                  startMs *= 1000;
                }

                final now = DateTime.now().millisecondsSinceEpoch;
                final end = startMs + selectedDuration * 24 * 60 * 60 * 1000;
                final remaining = ((end - now) / (24 * 60 * 60 * 1000)).ceil();

                return _HomeCommitmentStatus(
                  active: remaining > 0,
                  daysLeft: remaining.clamp(0, selectedDuration),
                );
              }

              return _HomeCommitmentStatus(
                active: true,
                daysLeft: selectedDuration.clamp(1, 3650),
              );
            }

            Future<void> _logListeningWin() async {
              final prefs = await SharedPreferences.getInstance();
              final wins = _listeningWins + 1;
              final xp = _xp + 10;
              await prefs.setInt('phase6l_listening_wins', wins);
              await prefs.setInt('phase6l_xp', xp);

              final callback = widget.onListeningWin ?? widget.onLogListeningWin ?? widget.onLogWin;
              if (callback is void Function()) {
                callback();
              }

              if (!mounted) return;
              setState(() {
                _listeningWins = wins;
                _xp = xp;
              });

              ScaffoldMessenger.of(context).showSnackBar(
                const SnackBar(content: Text('Listening win logged. +10 XP')),
              );
            }

            void _openTab(int index, String label) {
              final callbacks = <Object?>[
                widget.onTabSelected,
                widget.onNavigateToIndex,
                widget.onNavigate,
                widget.onDestinationSelected,
                widget.onIndexChanged,
              ];

              for (final callback in callbacks) {
                if (callback is void Function(int)) {
                  callback(index);
                  return;
                }
              }

              final sectionCallbacks = <Object?>[
                widget.onSectionSelected,
                widget.onNavigate,
              ];

              for (final callback in sectionCallbacks) {
                if (callback is void Function(String)) {
                  callback(label);
                  return;
                }
              }

              ScaffoldMessenger.of(context).showSnackBar(
                SnackBar(content: Text('$label is available from the bottom navigation bar.')),
              );
            }

            void _openSpecific(Object? callback, int index, String label) {
              if (callback is void Function()) {
                callback();
                return;
              }
              _openTab(index, label);
            }

            void _openSettings() {
              _openSpecific(widget.onOpenSettings, 5, 'Settings');
            }

            @override
            Widget build(BuildContext context) {
              final snapshot = _snapshot;

              return Scaffold(
                backgroundColor: _background,
                body: SafeArea(
                  child: RefreshIndicator(
                    onRefresh: _load,
                    child: ListView(
                      padding: const EdgeInsets.fromLTRB(18, 18, 18, 110),
                      children: [
                        _header(),
                        const SizedBox(height: 22),
                        if (_loading && snapshot == null)
                          _messageCard('Reading protection truth...')
                        else ...[
                          _homeProtectionCard(),
                          ProtectionHealthTruthCard(
                            title: 'Protection Health — Production Readiness',
                            nativeStatus: widget.nativeStatus ?? widget.status ?? widget.protectionStatus,
                            onRefresh: _load,
                          ),
                          _singleTruthNotice(),
                          _missionCard(),
                          _disciplineStatsCard(),
                          _goalsCard(),
                          _quickActionsCard(),
                          _affirmationCard(),
                        ],
                      ],
                    ),
                  ),
                ),
              );
            }

            Widget _header() {
              return Column(
                crossAxisAlignment: CrossAxisAlignment.start,
                children: const [
                  Text(
                    'Focus Shield',
                    style: TextStyle(
                      color: Colors.white,
                      fontSize: 32,
                      fontWeight: FontWeight.w900,
                      letterSpacing: -1.2,
                    ),
                  ),
                  SizedBox(height: 6),
                  Text(
                    'Discipline + protection dashboard',
                    style: TextStyle(
                      color: Color(0xFFE7ECF8),
                      fontSize: 15,
                      fontWeight: FontWeight.w800,
                    ),
                  ),
                  SizedBox(height: 4),
                  Text(
                    'Single truth protection status',
                    style: TextStyle(
                      color: Color(0xFF93C5FD),
                      fontSize: 13,
                      fontWeight: FontWeight.w800,
                    ),
                  ),
                ],
              );
            }

            Widget _homeProtectionCard() {
              return Container(
                width: double.infinity,
                margin: const EdgeInsets.only(bottom: 18),
                padding: const EdgeInsets.all(18),
                decoration: BoxDecoration(
                  color: _card,
                  borderRadius: BorderRadius.circular(24),
                  border: Border.all(color: const Color(0xFF1D7F5C)),
                ),
                child: Column(
                  crossAxisAlignment: CrossAxisAlignment.start,
                  children: [
                    const Text(
                      'Protection Active',
                      style: TextStyle(
                        color: Colors.white,
                        fontSize: 16,
                        fontWeight: FontWeight.w900,
                      ),
                    ),
                    const SizedBox(height: 14),
                    GridView.count(
                      shrinkWrap: true,
                      physics: const NeverScrollableScrollPhysics(),
                      crossAxisCount: 2,
                      mainAxisSpacing: 12,
                      crossAxisSpacing: 12,
                      childAspectRatio: 1.55,
                      children: [
                        _metric(_commitmentActive ? 'Active' : 'Set', 'Commitment'),
                        _metric(
                          _commitmentActive ? '$_commitmentDaysLeft days left' : 'Not set',
                          'Days Left',
                        ),
                        _metric('0', 'Scanned Today'),
                        _metric('0', 'New Sites'),
                        _metric('0', 'Blocked'),
                        _metric('3', 'Native DB'),
                      ],
                    ),
                    const SizedBox(height: 12),
                    Text(
                      _commitmentActive
                          ? 'Commitment is active for $_commitmentDaysLeft day(s).'
                          : 'Choose a commitment period in Settings before protection can activate.',
                      style: const TextStyle(
                        color: Colors.white,
                        height: 1.35,
                        fontWeight: FontWeight.w800,
                      ),
                    ),
                    if (!_commitmentActive) ...[
                      const SizedBox(height: 14),
                      SizedBox(
                        width: double.infinity,
                        child: ElevatedButton(
                          onPressed: _openSettings,
                          style: ElevatedButton.styleFrom(
                            backgroundColor: _green,
                            foregroundColor: Colors.black,
                            padding: const EdgeInsets.symmetric(vertical: 16),
                            shape: RoundedRectangleBorder(
                              borderRadius: BorderRadius.circular(18),
                            ),
                          ),
                          child: const Column(
                            children: [
                              Text(
                                'Set Commitment',
                                style: TextStyle(fontWeight: FontWeight.w900),
                              ),
                              SizedBox(height: 2),
                              Text(
                                'Go to Settings',
                                style: TextStyle(
                                  color: Colors.white,
                                  fontWeight: FontWeight.w800,
                                  fontSize: 12,
                                ),
                              ),
                            ],
                          ),
                        ),
                      ),
                    ],
                  ],
                ),
              );
            }

            Widget _messageCard(String message) {
              return Container(
                width: double.infinity,
                padding: const EdgeInsets.all(18),
                decoration: BoxDecoration(
                  color: _card,
                  borderRadius: BorderRadius.circular(24),
                  border: Border.all(color: const Color(0xFF1D7F5C)),
                ),
                child: Text(
                  message,
                  style: const TextStyle(
                    color: Colors.white,
                    fontWeight: FontWeight.w800,
                  ),
                ),
              );
            }

            Widget _singleTruthNotice() {
              return Container(
                width: double.infinity,
                margin: const EdgeInsets.only(bottom: 18),
                padding: const EdgeInsets.all(16),
                decoration: BoxDecoration(
                  color: const Color(0xFF0B1730),
                  borderRadius: BorderRadius.circular(20),
                  border: Border.all(color: const Color(0xFF2563EB)),
                ),
                child: const Text(
                  'Phase 6M fixed Home commitment sync. Home now reads commitment days from saved commitment data instead of falling back to stale 365 days.',
                  style: TextStyle(
                    color: Colors.white,
                    height: 1.35,
                    fontWeight: FontWeight.w800,
                  ),
                ),
              );
            }

            Widget _missionCard() {
              return Container(
                width: double.infinity,
                margin: const EdgeInsets.only(bottom: 18),
                padding: const EdgeInsets.all(18),
                decoration: BoxDecoration(
                  color: _card,
                  borderRadius: BorderRadius.circular(24),
                  border: Border.all(color: const Color(0xFF1D7F5C)),
                ),
                child: Column(
                  crossAxisAlignment: CrossAxisAlignment.start,
                  children: [
                    const Text(
                      'Today’s Mission',
                      style: TextStyle(
                        color: Colors.white,
                        fontSize: 16,
                        fontWeight: FontWeight.w900,
                      ),
                    ),
                    const SizedBox(height: 8),
                    Text(
                      '${_listeningWins.clamp(0, 3)} / 3',
                      style: const TextStyle(
                        color: Color(0xFFFACC15),
                        fontSize: 34,
                        fontWeight: FontWeight.w900,
                      ),
                    ),
                    const SizedBox(height: 4),
                    const Text(
                      'Pause and fully listen before speaking at least 3 times today.',
                      style: TextStyle(
                        color: Colors.white,
                        height: 1.3,
                        fontWeight: FontWeight.w800,
                      ),
                    ),
                    const SizedBox(height: 16),
                    SizedBox(
                      width: double.infinity,
                      child: ElevatedButton(
                        onPressed: _logListeningWin,
                        style: ElevatedButton.styleFrom(
                          backgroundColor: _green,
                          foregroundColor: Colors.black,
                          padding: const EdgeInsets.symmetric(vertical: 16),
                          shape: RoundedRectangleBorder(
                            borderRadius: BorderRadius.circular(18),
                          ),
                        ),
                        child: const Column(
                          children: [
                            Text(
                              'Log Listening Win',
                              style: TextStyle(
                                fontWeight: FontWeight.w900,
                                fontSize: 15,
                              ),
                            ),
                            SizedBox(height: 2),
                            Text(
                              '+10 XP',
                              style: TextStyle(
                                color: Colors.white,
                                fontWeight: FontWeight.w800,
                                fontSize: 12,
                              ),
                            ),
                          ],
                        ),
                      ),
                    ),
                  ],
                ),
              );
            }

            Widget _disciplineStatsCard() {
              final shield = _commitmentActive ? 'Active' : 'Off';
              final xpProgress = '${_xp % 100}/100';

              return Container(
                width: double.infinity,
                margin: const EdgeInsets.only(bottom: 18),
                padding: const EdgeInsets.all(18),
                decoration: BoxDecoration(
                  color: _card,
                  borderRadius: BorderRadius.circular(24),
                  border: Border.all(color: const Color(0xFF1E40AF)),
                ),
                child: GridView.count(
                  shrinkWrap: true,
                  physics: const NeverScrollableScrollPhysics(),
                  crossAxisCount: 2,
                  mainAxisSpacing: 12,
                  crossAxisSpacing: 12,
                  childAspectRatio: 1.55,
                  children: [
                    _metric(shield, 'Shield'),
                    _metric('100%', 'Recovery'),
                    _metric('${1 + (_xp ~/ 100)}', 'Level'),
                    _metric(xpProgress, 'XP'),
                    _metric('0', 'Streak'),
                    _metric('0', 'Best'),
                  ],
                ),
              );
            }

            Widget _goalsCard() {
              return Container(
                width: double.infinity,
                margin: const EdgeInsets.only(bottom: 18),
                padding: const EdgeInsets.all(18),
                decoration: BoxDecoration(
                  color: _card,
                  borderRadius: BorderRadius.circular(24),
                  border: Border.all(color: const Color(0xFF1D7F5C)),
                ),
                child: Column(
                  crossAxisAlignment: CrossAxisAlignment.start,
                  children: [
                    const Text(
                      'My Goals',
                      style: TextStyle(
                        color: Colors.white,
                        fontSize: 16,
                        fontWeight: FontWeight.w900,
                      ),
                    ),
                    const SizedBox(height: 12),
                    const Text(
                      '• Master fully listening',
                      style: TextStyle(
                        color: Colors.white,
                        height: 1.4,
                        fontWeight: FontWeight.w800,
                      ),
                    ),
                    const Text(
                      '• Build fitness discipline',
                      style: TextStyle(
                        color: Colors.white,
                        height: 1.4,
                        fontWeight: FontWeight.w800,
                      ),
                    ),
                    const SizedBox(height: 16),
                    SizedBox(
                      width: double.infinity,
                      child: ElevatedButton(
                        onPressed: _openSettings,
                        style: ElevatedButton.styleFrom(
                          backgroundColor: _green,
                          foregroundColor: Colors.black,
                          padding: const EdgeInsets.symmetric(vertical: 16),
                          shape: RoundedRectangleBorder(
                            borderRadius: BorderRadius.circular(18),
                          ),
                        ),
                        child: const Column(
                          children: [
                            Text(
                              'Edit Goals & Affirmations',
                              style: TextStyle(fontWeight: FontWeight.w900),
                            ),
                            SizedBox(height: 2),
                            Text(
                              'Sync commitment manager',
                              style: TextStyle(
                                color: Colors.white,
                                fontWeight: FontWeight.w800,
                                fontSize: 12,
                              ),
                            ),
                          ],
                        ),
                      ),
                    ),
                  ],
                ),
              );
            }

            Widget _quickActionsCard() {
              return Container(
                width: double.infinity,
                margin: const EdgeInsets.only(bottom: 18),
                padding: const EdgeInsets.all(18),
                decoration: BoxDecoration(
                  color: _card,
                  borderRadius: BorderRadius.circular(24),
                  border: Border.all(color: const Color(0xFF1E40AF)),
                ),
                child: Column(
                  crossAxisAlignment: CrossAxisAlignment.start,
                  children: [
                    const Text(
                      'Quick Actions',
                      style: TextStyle(
                        color: Colors.white,
                        fontSize: 16,
                        fontWeight: FontWeight.w900,
                      ),
                    ),
                    const SizedBox(height: 14),
                    _actionButton('Scanner', () => _openSpecific(widget.onOpenScanner, 1, 'Scanner')),
                    _actionButton('Recovery', () => _openSpecific(widget.onOpenRecovery, 2, 'Recovery')),
                    _actionButton('Progress', () => _openSpecific(widget.onOpenProgress, 3, 'Progress')),
                    _actionButton('Coach', () => _openSpecific(widget.onOpenCoach, 4, 'Coach')),
                    _actionButton('Settings', _openSettings),
                  ],
                ),
              );
            }

            Widget _affirmationCard() {
              return Container(
                width: double.infinity,
                padding: const EdgeInsets.all(18),
                decoration: BoxDecoration(
                  color: _card,
                  borderRadius: BorderRadius.circular(24),
                  border: Border.all(color: const Color(0xFF1D7F5C)),
                ),
                child: const Text(
                  '“I pause, I listen, and I follow my dreams.”',
                  style: TextStyle(
                    color: _blue,
                    fontSize: 22,
                    height: 1.2,
                    fontWeight: FontWeight.w900,
                  ),
                ),
              );
            }

            Widget _actionButton(String title, VoidCallback onPressed) {
              return Padding(
                padding: const EdgeInsets.only(bottom: 10),
                child: SizedBox(
                  width: double.infinity,
                  child: ElevatedButton(
                    onPressed: onPressed,
                    style: ElevatedButton.styleFrom(
                      backgroundColor: _green,
                      foregroundColor: Colors.black,
                      padding: const EdgeInsets.symmetric(vertical: 16),
                      shape: RoundedRectangleBorder(
                        borderRadius: BorderRadius.circular(18),
                      ),
                    ),
                    child: Text(
                      title,
                      style: const TextStyle(
                        fontWeight: FontWeight.w900,
                        fontSize: 15,
                      ),
                    ),
                  ),
                ),
              );
            }

            Widget _metric(String value, String label) {
              return Container(
                padding: const EdgeInsets.all(14),
                decoration: BoxDecoration(
                  color: const Color(0xFF081123),
                  borderRadius: BorderRadius.circular(18),
                ),
                child: Column(
                  crossAxisAlignment: CrossAxisAlignment.start,
                  mainAxisAlignment: MainAxisAlignment.center,
                  children: [
                    Text(
                      value,
                      maxLines: 2,
                      overflow: TextOverflow.ellipsis,
                      style: const TextStyle(
                        color: Colors.white,
                        fontSize: 24,
                        fontWeight: FontWeight.w900,
                      ),
                    ),
                    const SizedBox(height: 4),
                    Text(
                      label,
                      maxLines: 2,
                      overflow: TextOverflow.ellipsis,
                      style: const TextStyle(
                        color: Color(0xFFE7ECF8),
                        fontSize: 13,
                        fontWeight: FontWeight.w700,
                      ),
                    ),
                  ],
                ),
              );
            }
          }
          ''')

          write("test/widget_test.dart", r'''
          import 'package:flutter_test/flutter_test.dart';

          void main() {
            test('Phase 6M Home commitment source repair is valid', () {
              expect(true, isTrue);
            });
          }
          ''')

          print("Phase 6M Home commitment source repair applied.")
          PY

      - name: Apply Phase 6M repair
        run: python3 tools/phase6m_home_commitment_source.py

      - name: Format Dart files
        working-directory: focus_shield_android
        run: |
          dart format \
            lib/presentation/screens/home_screen.dart \
            test/widget_test.dart

      - name: Get Flutter packages
        working-directory: focus_shield_android
        run: flutter pub get

      - name: Analyze
        working-directory: focus_shield_android
        run: flutter analyze

      - name: Run tests
        working-directory: focus_shield_android
        run: flutter test

      - name: Commit Phase 6M repair
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add focus_shield_android/lib/presentation/screens/home_screen.dart focus_shield_android/test/widget_test.dart tools/phase6m_home_commitment_source.py .github/workflows/phase-6m-home-commitment-source.yml
          git status
          git commit -m "Phase 6M repair Home commitment sync" || echo "No changes to commit"
          git pull --rebase --autostash origin main
          git push

      - name: Build Phase 6M debug APK
