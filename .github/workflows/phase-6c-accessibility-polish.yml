name: Phase 6C Accessibility Polish APK

on:
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  patch-build:
    name: Patch Phase 6C and Build APK
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=1024m -Dfile.encoding=UTF-8"
      JAVA_TOOL_OPTIONS: "-Xmx4096m"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Apply Phase 6C patch
        run: python3 tools/phase6c_accessibility_polish_patch.py

      - name: Format Dart files
        working-directory: focus_shield_android
        run: dart format lib

      - name: Get Flutter packages
        working-directory: focus_shield_android
        run: flutter pub get

      - name: Analyze
        working-directory: focus_shield_android
        run: flutter analyze

      - name: Run tests
        working-directory: focus_shield_android
        run: flutter test

      - name: Commit Phase 6C patch
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add focus_shield_android tools/phase6c_accessibility_polish_patch.py .github/workflows/phase-6c-accessibility-polish.yml
          git commit -m "Phase 6C accessibility polish and blocked site fallback" || echo "No changes to commit"
          git push

      - name: Build Phase 6C debug APK
        working-directory: focus_shield_android
        run: flutter build apk --debug

      - name: Upload Phase 6C debug APK
        uses: actions/upload-artifact@v4
        with:
          name: focus-shield-phase-6c-debug-apk
          path: focus_shield_android/build/app/outputs/flutter-apk/app-debug.apk
          if-no-files-found: error
