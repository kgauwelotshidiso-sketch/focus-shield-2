      - name: Install Flutter packages
        working-directory: focus_shield_android
        run: flutter pub get

      - name: Format Phase 4A code
        run: dart format focus_shield_android/lib/presentation/screens/progress_screen.dart

      - name: Run safe checks
        run: bash android_build_plan/safe_flutter_checks.sh

      - name: Commit Phase 4A patch
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add focus_shield_android/pubspec.yaml focus_shield_android/pubspec.lock focus_shield_android/lib/presentation/screens/progress_screen.dart
          git status
          git commit -m "Phase 4A discipline commitment sprint" || echo "No changes to commit"
          git push

      - name: Build Phase 4A debug APK
        working-directory: focus_shield_android
        run: flutter build apk --debug --android-skip-build-dependency-validation

      - name: Upload Phase 4A debug APK
        uses: actions/upload-artifact@v4
        with:
          name: focus-shield-phase4a-debug-apk
          path: focus_shield_android/build/app/outputs/flutter-apk/app-debug.apk
