          class _GoalsAffirmationsEditorPage extends StatefulWidget {
            const _GoalsAffirmationsEditorPage({
              required this.goals,
              required this.affirmations,
              required this.onSaved,
            });

            final List<String> goals;
            final List<String> affirmations;
            final Future<void> Function(List<String>, List<String>) onSaved;

            @override
            State<_GoalsAffirmationsEditorPage> createState() =>
                _GoalsAffirmationsEditorPageState();
          }

          class _GoalsAffirmationsEditorPageState
              extends State<_GoalsAffirmationsEditorPage> {
            late List<String> _goals;
            late List<String> _affirmations;
            final TextEditingController _goalController = TextEditingController();
            final TextEditingController _affirmationController =
                TextEditingController();

            @override
            void initState() {
              super.initState();
              _goals = [...widget.goals];
              _affirmations = [...widget.affirmations];
            }

            @override
            void dispose() {
              _goalController.dispose();
              _affirmationController.dispose();
              super.dispose();
            }

            void _addGoal() {
              final value = _goalController.text.trim();
              if (value.isEmpty) {
                return;
              }
              setState(() {
                _goals.add(value);
                _goalController.clear();
              });
            }

            void _addAffirmation() {
              final value = _affirmationController.text.trim();
              if (value.isEmpty) {
                return;
              }
              setState(() {
                _affirmations.add(value);
                _affirmationController.clear();
              });
            }

            @override
            Widget build(BuildContext context) {
              return Scaffold(
                backgroundColor: const Color(0xFF050816),
                appBar: AppBar(
                  backgroundColor: const Color(0xFF050816),
                  foregroundColor: Colors.white,
                  title: const Text('Edit Goals'),
                  actions: [
                    TextButton(
                      onPressed: () async {
                        await widget.onSaved(_goals, _affirmations);
                        if (context.mounted) {
                          Navigator.of(context).pop();
                        }
                      },
                      child: const Text('Save'),
                    ),
                  ],
                ),
                body: ListView(
                  padding: const EdgeInsets.all(16),
                  children: [
                    const Text(
                      'Goals',
                      style: TextStyle(color: Colors.white, fontSize: 20),
                    ),
                    const SizedBox(height: 8),
                    _inputRow(
                      controller: _goalController,
                      hint: 'Add a goal',
                      onAdd: _addGoal,
                    ),
                    const SizedBox(height: 8),
                    ..._goals.asMap().entries.map((entry) {
                      return _editableItem(
                        entry.value,
                        () => setState(() => _goals.removeAt(entry.key)),
                      );
                    }),
                    const SizedBox(height: 20),
                    const Text(
                      'Affirmations',
                      style: TextStyle(color: Colors.white, fontSize: 20),
                    ),
                    const SizedBox(height: 8),
                    _inputRow(
                      controller: _affirmationController,
                      hint: 'Add an affirmation',
                      onAdd: _addAffirmation,
                    ),
                    const SizedBox(height: 8),
                    ..._affirmations.asMap().entries.map((entry) {
                      return _editableItem(
                        entry.value,
                        () => setState(() => _affirmations.removeAt(entry.key)),
                      );
                    }),
                  ],
                ),
              );
            }

            Widget _inputRow({
              required TextEditingController controller,
              required String hint,
              required VoidCallback onAdd,
            }) {
              return Row(
                children: [
                  Expanded(
                    child: TextField(
                      controller: controller,
                      style: const TextStyle(color: Colors.white),
                      decoration: InputDecoration(
                        hintText: hint,
                        hintStyle: const TextStyle(color: Colors.white38),
                        border: const OutlineInputBorder(),
                      ),
                    ),
                  ),
                  const SizedBox(width: 8),
                  ElevatedButton(
                    onPressed: onAdd,
                    child: const Text('Add'),
                  ),
                ],
              );
            }

            Widget _editableItem(String text, VoidCallback onDelete) {
              return Card(
                color: const Color(0xFF11172A),
                child: ListTile(
                  title: Text(text, style: const TextStyle(color: Colors.white)),
                  trailing: IconButton(
                    onPressed: onDelete,
                    icon: const Icon(Icons.delete_outline, color: Colors.white70),
                  ),
                ),
              );
            }
          }
          ''')

