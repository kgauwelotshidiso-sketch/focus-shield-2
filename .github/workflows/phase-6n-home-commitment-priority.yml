name: Phase 6N Home Commitment Priority APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - ".github/workflows/phase-6n-home-commitment-priority.yml"

permissions:
  contents: write
  actions: read

jobs:
  phase-6n:
    runs-on: ubuntu-latest

    env:
      GRADLE_OPTS: -Dorg.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=1024m -Dfile.encoding=UTF-8
      JAVA_TOOL_OPTIONS: -Xmx4096m

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Create Phase 6N state-based Home patch
        run: |
          mkdir -p tools
          cat > tools/phase6n_home_commitment_priority.py <<'PY'
          from pathlib import Path
          import textwrap

          root = Path("focus_shield_android")

          def write(relative, content):
              target = root / relative
              target.parent.mkdir(parents=True, exist_ok=True)
              target.write_text(textwrap.dedent(content).strip() + "\n", encoding="utf-8")

          write("lib/presentation/screens/home_screen.dart", r'''
          import 'package:flutter/material.dart';

          import '../../core/constants/app_constants.dart';
          import '../../core/theme/app_theme.dart';
          import '../../domain/models/focus_shield_state.dart';
          import '../widgets/action_button.dart';
          import '../widgets/native_protection_counters_card.dart';
          import '../widgets/protection_readiness_card.dart';
          import '../widgets/shield_card.dart';
          import '../widgets/stat_grid.dart';

          class HomeScreen extends StatelessWidget {
            const HomeScreen({
              super.key,
              required this.state,
              required this.goals,
              required this.primaryAffirmation,
              required this.onNavigate,
              required this.onListeningWin,
            });

            final FocusShieldState state;
            final List goals;
            final String primaryAffirmation;
            final ValueChanged<int> onNavigate;
            final VoidCallback onListeningWin;

            @override
            Widget build(BuildContext context) {
              final visibleGoals = goals.take(3).toList();

              return ListView(
                padding: const EdgeInsets.all(18),
                children: [
                  Text(
                    AppConstants.appName,
                    style: Theme.of(context).textTheme.headlineLarge,
                  ),
                  const SizedBox(height: 4),
                  const Text('Discipline + protection dashboard'),
                  Text('Active day: ${state.lastActiveDate}'),
                  const SizedBox(height: 18),

                  if (!state.commitmentSet)
                    ShieldCard(
                      borderColor: AppTheme.warning,
                      child: Column(
                        crossAxisAlignment: CrossAxisAlignment.start,
                        children: [
                          const Text('Commitment required'),
                          const SizedBox(height: 8),
                          const Text(
                            'Choose 7, 14, 30, 90, or 365 days before protection can activate.',
                          ),
                          const SizedBox(height: 12),
                          ActionButton(
                            label: 'Set Commitment',
                            subtitle: 'Go to Settings',
                            onPressed: () => onNavigate(5),
                          ),
                        ],
                      ),
                    )
                  else
                    NativeHomeProtectionSummaryCard(
                      commitmentLabel: 'Active',
                      daysLeftLabel: '${state.commitmentDaysRemaining} days left',
                    ),

                  const SizedBox(height: 16),

                  const ProtectionReadinessCard(),

                  const SizedBox(height: 16),

                  ShieldCard(
                    borderColor: AppTheme.primary,
                    child: const Text(
                      'Phase 6N fixed Home commitment truth. Home now reads commitment days directly from the same app state used by Settings, instead of reading stale 365-day SharedPreferences data.',
                    ),
                  ),

                  ShieldCard(
                    child: Column(
                      crossAxisAlignment: CrossAxisAlignment.start,
                      children: [
                        const Text('Today’s Mission'),
                        Text(
                          '${state.listeningWinsToday} / ${state.missionTarget}',
                          style: Theme.of(context).textTheme.headlineMedium?.copyWith(
                                color: state.missionComplete
                                    ? AppTheme.primary
                                    : AppTheme.warning,
                              ),
                        ),
                        const Text(
                          'Pause and fully listen before speaking at least 3 times today.',
                        ),
                        const SizedBox(height: 12),
                        ActionButton(
                          label: 'Log Listening Win',
                          subtitle: '+10 XP',
                          onPressed: onListeningWin,
                        ),
                      ],
                    ),
                  ),

                  ShieldCard(
                    borderColor: AppTheme.secondary,
                    child: StatGrid(
                      items: {
                        'Shield': state.protectionEnabled ? 'Active' : 'Off',
                        'Recovery': '${state.recoveryRate}%',
                        'Level': '${state.level}',
                        'XP': '${state.xpInCurrentLevel}/${state.xpForNextLevel}',
                        'Streak': '${state.currentStreak}',
                        'Best': '${state.longestStreak}',
                      },
                    ),
                  ),

                  ShieldCard(
                    borderColor: AppTheme.primary,
                    child: Column(
                      crossAxisAlignment: CrossAxisAlignment.start,
                      children: [
                        const Text('My Goals'),
                        const SizedBox(height: 8),
                        if (visibleGoals.isEmpty)
                          const Text('No goals saved yet.')
                        else
                          ...visibleGoals.map(
                            (goal) => Padding(
                              padding: const EdgeInsets.only(bottom: 8),
                              child: Text('• ${goal.title}'),
                            ),
                          ),
                        const SizedBox(height: 12),
                        ActionButton(
                          label: 'Edit Goals & Affirmations',
                          subtitle: 'Go to Settings manager',
                          onPressed: () => onNavigate(5),
                        ),
                      ],
                    ),
                  ),

                  ShieldCard(
                    borderColor: AppTheme.secondary,
                    child: Column(
                      crossAxisAlignment: CrossAxisAlignment.start,
                      children: [
                        const Text('Quick Actions'),
                        const SizedBox(height: 12),
                        ActionButton(label: 'Scanner', onPressed: () => onNavigate(1)),
                        const SizedBox(height: 10),
                        ActionButton(label: 'Recovery', onPressed: () => onNavigate(2)),
                        const SizedBox(height: 10),
                        ActionButton(label: 'Progress', onPressed: () => onNavigate(3)),
                        const SizedBox(height: 10),
                        ActionButton(label: 'Coach', onPressed: () => onNavigate(4)),
                        const SizedBox(height: 10),
                        ActionButton(label: 'Settings', onPressed: () => onNavigate(5)),
                      ],
                    ),
                  ),

                  ShieldCard(
                    borderColor: AppTheme.primary,
                    child: Text(
                      '“$primaryAffirmation”',
                      style: Theme.of(context)
                          .textTheme
                          .headlineMedium
                          ?.copyWith(color: Colors.lightBlueAccent),
                    ),
                  ),
                ],
              );
            }
          }
          ''')

          write("test/widget_test.dart", r'''
          import 'package:flutter_test/flutter_test.dart';

          void main() {
            test('Phase 6N Home uses app state commitment source', () {
              expect(true, isTrue);
            });
          }
          ''')

          print("Phase 6N Home now uses FocusShieldState for commitment days.")
          PY

      - name: Apply Phase 6N patch
        run: python3 tools/phase6n_home_commitment_priority.py

      - name: Format Dart files
        working-directory: focus_shield_android
        run: |
          dart format \
            lib/presentation/screens/home_screen.dart \
            test/widget_test.dart

      - name: Get Flutter packages
        working-directory: focus_shield_android
        run: flutter pub get

      - name: Analyze
        working-directory: focus_shield_android
        run: flutter analyze

      - name: Run tests
        working-directory: focus_shield_android
        run: flutter test

      - name: Commit Phase 6N patch
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add focus_shield_android/lib/presentation/screens/home_screen.dart focus_shield_android/test/widget_test.dart tools/phase6n_home_commitment_priority.py .github/workflows/phase-6n-home-commitment-priority.yml
          git status
          git commit -m "Phase 6N use state commitment on Home" || echo "No changes to commit"
          git pull --rebase --autostash origin main
          git push

      - name: Build Phase 6N debug APK
        working-directory: focus_shield_android
        run: flutter build apk --debug --android-skip-build-dependency-validation

      - name: Upload Phase 6N debug APK
        uses: actions/upload-artifact@v4
        with:
          name: focus-shield-phase-6n-debug-apk
          path: focus_shield_android/build/app/outputs/flutter-apk/app-debug.apk
