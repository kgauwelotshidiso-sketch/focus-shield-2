name: Android Debug APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "focus_shield_android/**"
      - ".github/workflows/android-debug-apk.yml"

jobs:
  build-debug-apk:
    name: Build Focus Shield Debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=1024m -Dfile.encoding=UTF-8"
      JAVA_TOOL_OPTIONS: "-Xmx4096m"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Show tool versions
        run: |
          java -version
          flutter --version
          dart --version

      - name: Configure Gradle memory for CI
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path("focus_shield_android/android/gradle.properties")
          text = path.read_text() if path.exists() else ""

          settings = {
              "org.gradle.daemon": "false",
              "org.gradle.parallel": "false",
              "org.gradle.configureondemand": "false",
              "org.gradle.caching": "false",
              "org.gradle.workers.max": "2",
              "org.gradle.jvmargs": "-Xmx4096m -XX:MaxMetaspaceSize=1024m -Dfile.encoding=UTF-8",
              "kotlin.compiler.execution.strategy": "in-process",
              "android.useAndroidX": "true",
              "android.enableJetifier": "true",
          }

          lines = []
          seen = set()

          for line in text.splitlines():
              key = line.split("=", 1)[0].strip() if "=" in line else ""
              if key in settings:
                  lines.append(f"{key}={settings[key]}")
                  seen.add(key)
              else:
                  lines.append(line)

          for key, value in settings.items():
              if key not in seen:
                  lines.append(f"{key}={value}")

          path.write_text("\n".join(lines).strip() + "\n")
          print(path.read_text())
          PY

      - name: Get Flutter packages
        working-directory: focus_shield_android
        run: flutter pub get

      - name: Analyze
        working-directory: focus_shield_android
        run: flutter analyze

      - name: Run tests
        working-directory: focus_shield_android
        run: flutter test

      - name: Build debug APK
        working-directory: focus_shield_android
        run: flutter build apk --debug

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: focus-shield-debug-apk
          path: focus_shield_android/build/app/outputs/flutter-apk/app-debug.apk
          if-no-files-found: error
