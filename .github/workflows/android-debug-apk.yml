name: Android Debug APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "focus_shield_android/**"
      - ".github/workflows/android-debug-apk.yml"

jobs:
  build-debug-apk:
    name: Build Focus Shield Debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Show tool versions
        run: |
          java -version
          flutter --version
          dart --version

      - name: Get Flutter packages
        working-directory: focus_shield_android
        run: flutter pub get

      - name: Analyze
        working-directory: focus_shield_android
        run: flutter analyze

      - name: Run tests
        working-directory: focus_shield_android
        run: flutter test

      - name: Build debug APK
        working-directory: focus_shield_android
        run: flutter build apk --debug

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: focus-shield-debug-apk
          path: focus_shield_android/build/app/outputs/flutter-apk/app-debug.apk
          if-no-files-found: error
