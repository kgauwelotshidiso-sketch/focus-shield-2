name: Android Debug APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write
  actions: read

jobs:
  build:
    name: Build Focus Shield Debug APK
    runs-on: ubuntu-latest

    env:
      GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=1024m -Dfile.encoding=UTF-8"
      JAVA_TOOL_OPTIONS: "-Xmx4096m"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Show tool versions
        run: |
          flutter --version
          dart --version
          java -version

      - name: Configure Gradle memory for CI
        run: |
          mkdir -p ~/.gradle
          cat > ~/.gradle/gradle.properties <<'EOF'
          org.gradle.daemon=false
          org.gradle.parallel=false
          org.gradle.configureondemand=false
          org.gradle.caching=false
          org.gradle.workers.max=2
          org.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=1024m -Dfile.encoding=UTF-8
          kotlin.compiler.execution.strategy=in-process
          android.useAndroidX=true
          android.enableJetifier=true
          EOF

      - name: Get Flutter packages
        working-directory: focus_shield_android
        run: flutter pub get

      - name: Run safe checks
        working-directory: focus_shield_android
        run: |
          flutter analyze
          flutter test

      - name: Build debug APK
        working-directory: focus_shield_android
        run: flutter build apk --debug

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: focus-shield-debug-apk
          path: focus_shield_android/build/app/outputs/flutter-apk/app-debug.apk
          if-no-files-found: error
