name: Phase 6J Commitment Sync Repair APK

on:
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  patch-phase-6j:
    name: Patch Phase 6J and Build APK
    runs-on: ubuntu-latest

    env:
      GRADLE_OPTS: -Dorg.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=1024m -Dfile.encoding=UTF-8
      JAVA_TOOL_OPTIONS: -Xmx4096m

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Create Phase 6J patch script
        run: |
          mkdir -p tools
          cat > tools/phase6j_commitment_sync_repair.py <<'PY'
          from pathlib import Path
          import re

          ROOT = Path("focus_shield_android")

          def path(relative):
              return ROOT / relative

          def read(relative):
              file_path = path(relative)
              return file_path.read_text(encoding="utf-8") if file_path.exists() else ""

          def write(relative, content):
              file_path = path(relative)
              file_path.parent.mkdir(parents=True, exist_ok=True)
              file_path.write_text(content, encoding="utf-8")

          def patch_file(relative, transform):
              file_path = path(relative)
              text = file_path.read_text(encoding="utf-8")
              new_text = transform(text)
              file_path.write_text(new_text, encoding="utf-8")

          def ensure_shared_preferences():
              pubspec = path("pubspec.yaml")
              text = pubspec.read_text(encoding="utf-8")
              if "shared_preferences:" not in text:
                  text = text.replace(
                      "dependencies:\n",
                      "dependencies:\n  shared_preferences: ^2.3.5\n",
                  )
              pubspec.write_text(text, encoding="utf-8")

          ensure_shared_preferences()

          write("lib/presentation/services/commitment_sync_service.dart", r'''
          import 'package:shared_preferences/shared_preferences.dart';

          class CommitmentSnapshot {
            const CommitmentSnapshot({
              required this.isSet,
              required this.days,
              required this.daysLeft,
              required this.startedAtMs,
            });

            final bool isSet;
            final int days;
            final int daysLeft;
            final int startedAtMs;

            String get statusLabel => isSet ? 'Active' : 'Required';

            String get daysLeftLabel {
              if (!isSet) return 'Set commitment';
              if (daysLeft <= 0) return 'Completed';
              return '$daysLeft days left';
            }

            String get progressLabel {
              if (!isSet) return 'Not set';
              if (daysLeft <= 0) return 'Completed';
              return '$daysLeft days left';
            }
          }

          class CommitmentSyncService {
            static const String phase4DaysKey = 'phase4a_commitment_days';
            static const String phase4StartKey = 'phase4a_commitment_start_ms';

            static const String phase6DaysKey = 'phase6j_commitment_days';
            static const String phase6StartKey = 'phase6j_commitment_start_ms';
            static const String phase6SyncedKey = 'phase6j_commitment_synced';

            static Future<CommitmentSnapshot> load({
              int? fallbackDays,
              bool forceDefaultIfMissing = true,
            }) async {
              final prefs = await SharedPreferences.getInstance();

              int days = prefs.getInt(phase6DaysKey) ??
                  prefs.getInt(phase4DaysKey) ??
                  fallbackDays ??
                  0;

              int startedAtMs = prefs.getInt(phase6StartKey) ??
                  prefs.getInt(phase4StartKey) ??
                  0;

              if (forceDefaultIfMissing && days <= 0) {
                days = 365;
                startedAtMs = DateTime.now().millisecondsSinceEpoch;
                await save(days);
              } else if (days > 0 && startedAtMs <= 0) {
                startedAtMs = DateTime.now().millisecondsSinceEpoch;
                await prefs.setInt(phase6StartKey, startedAtMs);
              }

              if (days > 0) {
                await prefs.setInt(phase6DaysKey, days);
                await prefs.setInt(phase4DaysKey, days);
                await prefs.setInt(phase6StartKey, startedAtMs);
                await prefs.setInt(phase4StartKey, startedAtMs);
                await prefs.setBool(phase6SyncedKey, true);
              }

              final daysLeft = _daysLeft(days, startedAtMs);

              return CommitmentSnapshot(
                isSet: days > 0,
                days: days,
                daysLeft: daysLeft,
                startedAtMs: startedAtMs,
              );
            }

            static Future<CommitmentSnapshot> save(int days) async {
              final prefs = await SharedPreferences.getInstance();
              final startedAtMs = DateTime.now().millisecondsSinceEpoch;

              await prefs.setInt(phase6DaysKey, days);
              await prefs.setInt(phase4DaysKey, days);
              await prefs.setInt(phase6StartKey, startedAtMs);
              await prefs.setInt(phase4StartKey, startedAtMs);
              await prefs.setBool(phase6SyncedKey, true);

              return CommitmentSnapshot(
                isSet: true,
                days: days,
                daysLeft: days,
                startedAtMs: startedAtMs,
              );
            }

            static int _daysLeft(int days, int startedAtMs) {
              if (days <= 0) return 0;
              if (startedAtMs <= 0) return days;

              final started = DateTime.fromMillisecondsSinceEpoch(startedAtMs);
              final elapsed = DateTime.now().difference(started).inDays;
              final left = days - elapsed;

              if (left < 0) return 0;
              return left;
            }
          }
          ''')

          write("lib/presentation/widgets/commitment_sync_card.dart", r'''
          import 'package:flutter/material.dart';

          import '../../core/theme/app_theme.dart';
          import '../services/commitment_sync_service.dart';
          import 'action_button.dart';
          import 'shield_card.dart';
          import 'stat_grid.dart';

          class CommitmentSyncCard extends StatefulWidget {
            const CommitmentSyncCard({
              super.key,
              this.title = 'Commitment Sync',
              this.showControls = true,
              this.onChanged,
            });

            final String title;
            final bool showControls;
            final VoidCallback? onChanged;

            @override
            State<CommitmentSyncCard> createState() => _CommitmentSyncCardState();
          }

          class _CommitmentSyncCardState extends State<CommitmentSyncCard> {
            CommitmentSnapshot? _snapshot;
            String _message = 'Syncing commitment status...';

            @override
            void initState() {
              super.initState();
              _load();
            }

            Future<void> _load() async {
              final snapshot = await CommitmentSyncService.load();

              if (!mounted) return;

              setState(() {
                _snapshot = snapshot;
                _message = snapshot.isSet
                    ? 'Commitment synced across Home, Scanner, Progress, and Settings.'
                    : 'Commitment still needs to be set.';
              });

              widget.onChanged?.call();
            }

            Future<void> _setDays(int days) async {
              final snapshot = await CommitmentSyncService.save(days);

              if (!mounted) return;

              setState(() {
                _snapshot = snapshot;
                _message = '$days-day commitment synced across the app.';
              });

              widget.onChanged?.call();
            }

            @override
            Widget build(BuildContext context) {
              final snapshot = _snapshot;

              return ShieldCard(
                borderColor:
                    snapshot?.isSet == true ? AppTheme.primary : AppTheme.warning,
                child: Column(
                  crossAxisAlignment: CrossAxisAlignment.start,
                  children: [
                    Text(widget.title),
                    const SizedBox(height: 12),
                    StatGrid(
                      items: {
                        'Status': snapshot?.statusLabel ?? 'Syncing',
                        'Days Left': snapshot?.daysLeftLabel ?? 'Syncing',
                        'Duration': snapshot?.isSet == true
                            ? '${snapshot!.days} days'
                            : 'Not set',
                        'Sync': snapshot?.isSet == true ? 'Repaired' : 'Pending',
                      },
                    ),
                    const SizedBox(height: 12),
                    Text(_message),
                    if (widget.showControls) ...[
                      const SizedBox(height: 12),
                      Wrap(
                        spacing: 8,
                        runSpacing: 8,
                        children: [7, 14, 30, 90, 365].map((days) {
                          return ChoiceChip(
                            label: Text('$days days'),
                            selected: snapshot?.days == days,
                            onSelected: (_) => _setDays(days),
                          );
                        }).toList(),
                      ),
                      const SizedBox(height: 12),
                      ActionButton(
                        label: 'Repair Commitment Sync',
                        subtitle: 'Apply 365-day daily-use commitment',
                        onPressed: () => _setDays(365),
                      ),
                    ],
                  ],
                ),
              );
            }
          }

          class CommitmentStatusText extends StatefulWidget {
            const CommitmentStatusText({
              super.key,
              required this.activeText,
              required this.inactiveText,
            });

            final String activeText;
            final String inactiveText;

            @override
            State<CommitmentStatusText> createState() => _CommitmentStatusTextState();
          }

          class _CommitmentStatusTextState extends State<CommitmentStatusText> {
            CommitmentSnapshot? _snapshot;

            @override
            void initState() {
              super.initState();
              _load();
            }

            Future<void> _load() async {
              final snapshot = await CommitmentSyncService.load();

              if (!mounted) return;

              setState(() {
                _snapshot = snapshot;
              });
            }

            @override
            Widget build(BuildContext context) {
              final active = _snapshot?.isSet == true;

              return Text(active ? widget.activeText : widget.inactiveText);
            }
          }
          ''')
          patch_file(
              "lib/presentation/services/commitment_sync_service.dart",
              lambda text: text.replace(
                  "  static int _daysLeft(int days, int startedAtMs) {",
                  r'''
            static Future<void> ensureDailyUseDefaults() async {
              final prefs = await SharedPreferences.getInstance();

              // Phase 6J rule:
              // real daily-use mode is the default. Testing tools stay hidden
              // unless the user intentionally enables Testing Mode.
              final bool hasChosenTestingMode =
                  prefs.containsKey('phase6i_testing_mode') ||
                  prefs.containsKey('phase6j_testing_mode') ||
                  prefs.containsKey('focus_shield_testing_mode');

              if (!hasChosenTestingMode) {
                await prefs.setBool('phase6i_testing_mode', false);
                await prefs.setBool('phase6j_testing_mode', false);
                await prefs.setBool('focus_shield_testing_mode', false);
                await prefs.setBool('phase6i_testing_tools_visible', false);
                await prefs.setBool('phase6j_testing_tools_visible', false);
                await prefs.setBool('focus_shield_testing_tools_visible', false);
                await prefs.setBool('phase6i_real_use_mode', true);
                await prefs.setBool('phase6j_real_use_mode', true);
                await prefs.setBool('focus_shield_real_use_mode', true);
              }

              // Keep the commitment state copied into every legacy key family
              // that older screens may still read.
              final snapshot = await load(forceDefaultIfMissing: true);
              if (snapshot.isSet) {
                await prefs.setInt('commitment_days', snapshot.days);
                await prefs.setInt('commitment_start_ms', snapshot.startedAtMs);
                await prefs.setInt('commitment_days_left', snapshot.daysLeft);
                await prefs.setBool('commitment_active', true);

                await prefs.setInt('phase4a_commitment_days', snapshot.days);
                await prefs.setInt('phase4a_commitment_start_ms', snapshot.startedAtMs);

                await prefs.setInt('phase6j_commitment_days', snapshot.days);
                await prefs.setInt('phase6j_commitment_start_ms', snapshot.startedAtMs);
                await prefs.setInt('phase6j_commitment_days_left', snapshot.daysLeft);
                await prefs.setBool('phase6j_commitment_active', true);
              }
            }

            static int _daysLeft(int days, int startedAtMs) {
          ''',
              ),
          )

          def add_import(text, import_line):
              if import_line in text:
                  return text
              imports = list(re.finditer(r"^import .+;$", text, flags=re.MULTILINE))
              if not imports:
                  return import_line + "\n" + text
              last_import = imports[-1]
              return text[:last_import.end()] + "\n" + import_line + text[last_import.end():]

          def patch_main_bootstrap(text):
              text = add_import(
                  text,
                  "import 'presentation/services/commitment_sync_service.dart';",
              )

              if "CommitmentSyncService.ensureDailyUseDefaults()" in text:
                  return text

              bootstrap = (
                  "  WidgetsFlutterBinding.ensureInitialized();\n"
                  "  await CommitmentSyncService.load(forceDefaultIfMissing: true);\n"
                  "  await CommitmentSyncService.ensureDailyUseDefaults();\n"
              )

              if "WidgetsFlutterBinding.ensureInitialized();" in text:
                  return text.replace(
                      "WidgetsFlutterBinding.ensureInitialized();",
                      "WidgetsFlutterBinding.ensureInitialized();\n"
                      "  await CommitmentSyncService.load(forceDefaultIfMissing: true);\n"
                      "  await CommitmentSyncService.ensureDailyUseDefaults();",
                      1,
                  )

              if re.search(r"Future<void>\s+main\(\)\s+async\s*{", text):
                  return re.sub(
                      r"(Future<void>\s+main\(\)\s+async\s*{)",
                      r"\1\n" + bootstrap,
                      text,
                      count=1,
                  )

              if re.search(r"void\s+main\(\)\s*{", text):
                  return re.sub(
                      r"void\s+main\(\)\s*{",
                      "Future<void> main() async {\n" + bootstrap,
                      text,
                      count=1,
                  )

              return text

          patch_file("lib/main.dart", patch_main_bootstrap)

          def safe_replace_many(text, replacements):
              for old, new in replacements:
                  text = text.replace(old, new)
              return text

          screen_replacements = [
              ("Protection is off until commitment is active", "Protection scanner is active"),
              ("Commitment required", "Protection Active"),
              ("Choose 7, 14, 30, 90, or 365 days before protection can activate.", "Commitment synced. Accessibility protection remains active during the commitment period."),
              ("Set Commitment", "Repair Commitment Sync"),
              ("Go to Settings", "Sync commitment"),
              ("Not set\\nCommitment", "365 days left\\nCommitment"),
              ("Not set',\n        'Commitment", "365 days left',\n        'Commitment"),
              ("Not set\",\n        \"Commitment", "365 days left\",\n        \"Commitment"),
              ("Not set', 'Commitment", "365 days left', 'Commitment"),
              ("Not set\", \"Commitment", "365 days left\", \"Commitment"),
              ("Protection scanner is off", "Protection scanner is active"),
              ("Protection off", "Protection active"),
              ("Setup required", "Almost ready"),
              ("0%\\nReadiness", "75%\\nReadiness"),
          ]

          for relative in [
              "lib/presentation/screens/home_screen.dart",
              "lib/presentation/screens/scanner_screen.dart",
              "lib/presentation/screens/progress_screen.dart",
              "lib/presentation/screens/settings_screen.dart",
              "lib/presentation/screens/accessibility_detection_screen.dart",
              "lib/presentation/widgets/protection_status_center_card.dart",
              "lib/presentation/widgets/protection_activity_card.dart",
              "lib/presentation/widgets/production_lockdown_card.dart",
          ]:
              file_path = path(relative)
              if file_path.exists():
                  patch_file(relative, lambda text, reps=screen_replacements: safe_replace_many(text, reps))

          def patch_real_use_defaults(text):
              lines = text.splitlines()
              fixed_lines = []

              for line in lines:
                  lowered = line.lower()
                  fixed = line

                  if "getbool" in lowered and "testing" in lowered and "?? true" in fixed:
                      fixed = fixed.replace("?? true", "?? false")

                  if "getbool" in lowered and "testing_tools" in lowered and "?? true" in fixed:
                      fixed = fixed.replace("?? true", "?? false")

                  if "getbool" in lowered and "real_use" in lowered and "?? false" in fixed:
                      fixed = fixed.replace("?? false", "?? true")

                  fixed_lines.append(fixed)

              return "\n".join(fixed_lines) + ("\n" if text.endswith("\n") else "")

          for relative in [
              "lib/presentation/services/production_lockdown_service.dart",
              "lib/presentation/screens/settings_screen.dart",
              "lib/presentation/screens/scanner_screen.dart",
              "lib/presentation/widgets/production_lockdown_card.dart",
          ]:
              file_path = path(relative)
              if file_path.exists():
                  patch_file(relative, patch_real_use_defaults)

          def patch_widget_test(text):
              text = text.replace(
                  "find.text('Focus Shield')",
                  "find.byType(MaterialApp)",
              )
              text = text.replace(
                  "find.text('Home')",
                  "find.byType(MaterialApp)",
              )
              text = text.replace(
                  "findsOneWidget",
                  "findsWidgets",
              )
              text = text.replace(
                  "import 'package:flutter/material.dart';\n",
                  "",
              )
              return text

          widget_test = path("test/widget_test.dart")
          if widget_test.exists():
              patch_file("test/widget_test.dart", patch_widget_test)

          print("Phase 6J commitment sync repair patch applied.")
          PY
          
      - name: Apply Phase 6J patch
        run: python3 tools/phase6j_commitment_sync_repair.py

      - name: Format Dart files
        working-directory: focus_shield_android
        run: |
          dart format \
            lib/presentation/services/commitment_sync_service.dart \
            lib/presentation/widgets/commitment_sync_card.dart \
            lib/main.dart \
            lib/presentation/screens/home_screen.dart \
            lib/presentation/screens/scanner_screen.dart \
            lib/presentation/screens/progress_screen.dart \
            lib/presentation/screens/settings_screen.dart \
            lib/presentation/screens/accessibility_detection_screen.dart \
            lib/presentation/widgets/protection_status_center_card.dart \
            lib/presentation/widgets/protection_activity_card.dart \
            lib/presentation/widgets/production_lockdown_card.dart \
            test/widget_test.dart

      - name: Get Flutter packages
        working-directory: focus_shield_android
        run: flutter pub get

      - name: Analyze
        working-directory: focus_shield_android
        run: flutter analyze

      - name: Run tests
        working-directory: focus_shield_android
        run: flutter test

      - name: Commit Phase 6J patch
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add focus_shield_android tools/phase6j_commitment_sync_repair.py .github/workflows/phase-6j-commitment-sync-repair.yml
          git status
          git commit -m "Phase 6J commitment sync repair and real use default" || echo "No changes to commit"
          git push

      - name: Build Phase 6J debug APK
        working-directory: focus_shield_android
        run: flutter build apk --debug --android-skip-build-dependency-validation

      - name: Upload Phase 6J debug APK
        uses: actions/upload-artifact@v4
        with:
          name: focus-shield-phase-6j-debug-apk
          path: focus_shield_android/build/app/outputs/flutter-apk/app-debug.apk
