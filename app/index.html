<!DOCTYPE html>
<html>
<head>
    <title>Focus Shield</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>Focus Shield</h1>

    <div class="card">
        <h2>Current Streak</h2>
        <h3 id="homeStreak">0 Days</h3>
    </div>

    <div class="card">
        <h2>Longest Streak</h2>
        <h3 id="homeLongestStreak">0 Days</h3>
    </div>

    <div class="card">
        <h2>Total Listening Wins</h2>
        <h3 id="homeTotalWins">0</h3>
    </div>

    <div class="card">
        <h2>This Week's Wins</h2>
        <h3 id="homeWeeklyWins">0</h3>
    </div>

    <div class="card">
        <h2>Today's Affirmation</h2>
        <p>"I pause, I listen, and I follow my dreams."</p>
    </div>

    <button id="goalsBtn">Goals</button>
    <button id="timerBtn">Focus Timer</button>
    <button id="concentrationBtn">Concentration</button>
    <button id="progressBtn">Progress</button>

</div>

<script>
function getToday() {
    return new Date().toDateString();
}

function getYesterday() {
    const yesterday = new Date();
    yesterday.setDate(yesterday.getDate() - 1);
    return yesterday.toDateString();
}

function getDateKey(date) {
    const year = date.getFullYear();
    const month = String(date.getMonth() + 1).padStart(2, "0");
    const day = String(date.getDate()).padStart(2, "0");
    return year + "-" + month + "-" + day;
}

function getTodayKey() {
    return getDateKey(new Date());
}

function formatDays(number) {
    if (number === 1) {
        return "1 Day";
    }

    return number + " Days";
}

function getNumber(key) {
    return Number(localStorage.getItem(key) || 0);
}

function saveValue(key, value) {
    localStorage.setItem(key, value);
}

function getHistory() {
    const savedHistory = localStorage.getItem("listeningHistory");

    if (savedHistory === null) {
        return {};
    }

    return JSON.parse(savedHistory);
}

function saveHistory(history) {
    localStorage.setItem("listeningHistory", JSON.stringify(history));
}

function getWeeklyWins() {
    const history = getHistory();
    let total = 0;

    for (let i = 0; i < 7; i++) {
        const date = new Date();
        date.setDate(date.getDate() - i);

        const key = getDateKey(date);
        total += Number(history[key] || 0);
    }

    return total;
}

function getWeeklyHistoryHtml() {
    const history = getHistory();
    let html = "";

    for (let i = 0; i < 7; i++) {
        const date = new Date();
        date.setDate(date.getDate() - i);

        const key = getDateKey(date);
        const label = date.toDateString();
        const wins = Number(history[key] || 0);

        html += `
            <p><strong>${label}:</strong> ${wins} wins</p>
        `;
    }

    return html;
}

function updateTodayHistory(count) {
    const history = getHistory();
    const todayKey = getTodayKey();

    history[todayKey] = count;
    saveHistory(history);
}

function getCurrentStreak() {
    const today = getToday();
    const yesterday = getYesterday();
    const lastStreakDate = localStorage.getItem("lastStreakDate");
    const streakCount = getNumber("streakCount");

    if (lastStreakDate === today || lastStreakDate === yesterday) {
        return streakCount;
    }

    return 0;
}

function getLongestStreak() {
    return getNumber("longestStreakCount");
}

function updateLongestStreak(currentStreak) {
    let longestStreak = getLongestStreak();

    if (currentStreak > longestStreak) {
        longestStreak = currentStreak;
        saveValue("longestStreakCount", longestStreak);
    }

    return longestStreak;
}

function updateHomeStats() {
    const currentStreak = getCurrentStreak();
    const longestStreak = updateLongestStreak(currentStreak);
    const totalWins = getNumber("totalListeningWins");
    const weeklyWins = getWeeklyWins();

    document.getElementById("homeStreak").textContent = formatDays(currentStreak);
    document.getElementById("homeLongestStreak").textContent = formatDays(longestStreak);
    document.getElementById("homeTotalWins").textContent = totalWins;
    document.getElementById("homeWeeklyWins").textContent = weeklyWins;
}

function updateStreakForToday() {
    const today = getToday();
    const yesterday = getYesterday();
    const lastStreakDate = localStorage.getItem("lastStreakDate");

    let streakCount = getNumber("streakCount");

    if (lastStreakDate === today) {
        return streakCount;
    }

    if (lastStreakDate === yesterday) {
        streakCount++;
    } else {
        streakCount = 1;
    }

    saveValue("streakCount", streakCount);
    saveValue("lastStreakDate", today);
    updateLongestStreak(streakCount);

    return streakCount;
}

function showPage(content) {
    document.body.innerHTML = `
        <div class="container">
            ${content}
        </div>
    `;
}

function goHome() {
    location.reload();
}

updateHomeStats();

document.getElementById("goalsBtn").addEventListener("click", function() {
    showPage(`
        <h1>My Goals</h1>

        <div class="card">
            <h2>Listening Goal</h2>
            <p>Wait for people to finish speaking before I respond.</p>
        </div>

        <div class="card">
            <h2>Fitness Goal</h2>
            <p>Build a fit body and stay disciplined.</p>
        </div>

        <button id="backBtn">Back</button>
    `);

    document.getElementById("backBtn").addEventListener("click", goHome);
});

document.getElementById("timerBtn").addEventListener("click", function() {
    showPage(`
        <h1>Focus Timer</h1>

        <div class="card">
            <h2 id="timer">10:00</h2>
        </div>

        <button id="startBtn">Start</button>
        <button id="backBtn">Back</button>
    `);

    let timeLeft = 600;
    let running = false;

    document.getElementById("startBtn").addEventListener("click", function() {
        if (running) return;

        running = true;

        const interval = setInterval(function() {
            timeLeft--;

            let minutes = Math.floor(timeLeft / 60);
            let seconds = timeLeft % 60;

            if (seconds < 10) {
                seconds = "0" + seconds;
            }

            document.getElementById("timer").textContent = minutes + ":" + seconds;

            if (timeLeft <= 0) {
                clearInterval(interval);
                alert("Focus Session Complete!");
            }
        }, 1000);
    });

    document.getElementById("backBtn").addEventListener("click", goHome);
});

document.getElementById("concentrationBtn").addEventListener("click", function() {
    showPage(`
        <h1>Concentration Trainer</h1>

        <div class="card">
            <h2>Affirmation</h2>
            <p>"I pause, I listen, and I follow my dreams."</p>
        </div>

        <button id="backBtn">Back</button>
    `);

    document.getElementById("backBtn").addEventListener("click", goHome);
});

document.getElementById("progressBtn").addEventListener("click", function() {
    const today = getToday();
    const savedDate = localStorage.getItem("listeningDate");

    if (savedDate !== today) {
        saveValue("listeningCount", 0);
        saveValue("listeningDate", today);
    }

    let listeningCount = getNumber("listeningCount");
    updateTodayHistory(listeningCount);

    let totalWins = getNumber("totalListeningWins");
    let currentStreak = getCurrentStreak();
    let longestStreak = updateLongestStreak(currentStreak);
    let weeklyWins = getWeeklyWins();

    const lastStreakDate = localStorage.getItem("lastStreakDate");

    showPage(`
        <h1>Progress Tracker</h1>

        <div class="card">
            <h2>Listening Practice Today</h2>
            <h3 id="listeningCount">${listeningCount}</h3>
            <p>Times I paused and listened before speaking.</p>
            <p><strong>Today:</strong> ${today}</p>
        </div>

        <div class="card">
            <h2>Total Listening Wins</h2>
            <h3 id="totalWinsCount">${totalWins}</h3>
            <p>All listening wins recorded since starting Focus Shield.</p>
        </div>

        <div class="card">
            <h2>This Week's Wins</h2>
            <h3 id="weeklyWinsCount">${weeklyWins}</h3>
            <p>Your listening wins from the last 7 days.</p>
        </div>

        <div class="card">
            <h2>Current Streak</h2>
            <h3 id="streakCount">${formatDays(currentStreak)}</h3>
            <p id="streakStatus">
                ${lastStreakDate === today ? "Completed today." : "Add one listening win today to protect your streak."}
            </p>
        </div>

        <div class="card">
            <h2>Longest Streak</h2>
            <h3 id="longestStreakCount">${formatDays(longestStreak)}</h3>
            <p>Your best discipline streak so far.</p>
        </div>

        <div class="card">
            <h2>Last 7 Days History</h2>
            <div id="weeklyHistory">
                ${getWeeklyHistoryHtml()}
            </div>
        </div>

        <button id="addListeningBtn">+ Add Listening Win</button>
        <button id="resetListeningBtn">Reset Today</button>
        <button id="backBtn">Back</button>
    `);

    document.getElementById("addListeningBtn").addEventListener("click", function() {
        listeningCount++;
        totalWins++;

        saveValue("listeningCount", listeningCount);
        saveValue("totalListeningWins", totalWins);
        saveValue("listeningDate", today);

        updateTodayHistory(listeningCount);

        const updatedStreak = updateStreakForToday();
        const updatedLongestStreak = updateLongestStreak(updatedStreak);
        const updatedWeeklyWins = getWeeklyWins();

        document.getElementById("listeningCount").textContent = listeningCount;
        document.getElementById("totalWinsCount").textContent = totalWins;
        document.getElementById("weeklyWinsCount").textContent = updatedWeeklyWins;
        document.getElementById("streakCount").textContent = formatDays(updatedStreak);
        document.getElementById("longestStreakCount").textContent = formatDays(updatedLongestStreak);
        document.getElementById("streakStatus").textContent = "Completed today.";
        document.getElementById("weeklyHistory").innerHTML = getWeeklyHistoryHtml();
    });

    document.getElementById("resetListeningBtn").addEventListener("click", function() {
        listeningCount = 0;

        saveValue("listeningCount", listeningCount);
        saveValue("listeningDate", today);

        updateTodayHistory(listeningCount);

        document.getElementById("listeningCount").textContent = listeningCount;
        document.getElementById("weeklyWinsCount").textContent = getWeeklyWins();
        document.getElementById("weeklyHistory").innerHTML = getWeeklyHistoryHtml();
    });

    document.getElementById("backBtn").addEventListener("click", goHome);
});
</script>

</body>
</html>
